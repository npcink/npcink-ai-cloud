services:
  postgres:
    ports: !override
      - "127.0.0.1:${NPCINK_CLOUD_M4_POSTGRES_PORT:-15433}:5432"

  redis:
    ports: !override
      - "127.0.0.1:${NPCINK_CLOUD_M4_REDIS_PORT:-16380}:6379"

  proxy:
    ports: !override
      - "127.0.0.1:${NPCINK_CLOUD_M4_PORT:-8010}:8080"
    volumes: !override
      - ./deploy/nginx.m4-preview.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/health/live >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: npcink-ai-cloud-runtime:m4-dev
    environment:
      NPCINK_CLOUD_BASE_URL: ${NPCINK_CLOUD_M4_PUBLIC_BASE_URL:-https://cloud.mqzjmax.top}
      NPCINK_CLOUD_BROWSER_ORIGIN_ALLOWLIST: ${NPCINK_CLOUD_M4_BROWSER_ORIGIN_ALLOWLIST:-https://cloud.mqzjmax.top,http://127.0.0.1:18010,http://localhost:18010}
      NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID: ${NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID:-m4-preview-service-v1}
      NPCINK_CLOUD_TRUSTED_HOST_ALLOWLIST: ${NPCINK_CLOUD_M4_TRUSTED_HOST_ALLOWLIST:-cloud.mqzjmax.top,127.0.0.1,127.0.0.1:8010,127.0.0.1:18010,localhost,localhost:8010,localhost:18010,api,api:8000,proxy,proxy:8080}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    image: npcink-ai-cloud-runtime:m4-dev
    environment:
      NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID: ${NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID:-m4-preview-service-v1}

  callback-worker:
    image: npcink-ai-cloud-runtime:m4-dev
    environment:
      NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID: ${NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID:-m4-preview-service-v1}

  ops-worker:
    image: npcink-ai-cloud-runtime:m4-dev
    environment:
      NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID: ${NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID:-m4-preview-service-v1}

  frontend:
    image: npcink-ai-cloud-frontend:m4-dev
    command:
      [
        "node",
        "node_modules/next/dist/bin/next",
        "dev",
        "--webpack",
        "-H",
        "0.0.0.0",
      ]
    environment:
      CLOUD_PUBLIC_BASE_URL: ${NPCINK_CLOUD_M4_PUBLIC_BASE_URL:-https://cloud.mqzjmax.top}
      NEXT_PUBLIC_ENV: development
      NEXT_PUBLIC_MINI_DEV_HOST_ALLOWLIST: ${NPCINK_CLOUD_M4_MINI_DEV_HOST_ALLOWLIST:-cloud.mqzjmax.top,127.0.0.1,localhost}
      NPCINK_CLOUD_LOCAL_DEBUG_DOCK_ALLOWED_HOSTS: ${NPCINK_CLOUD_M4_LOCAL_DEBUG_DOCK_ALLOWED_HOSTS:-127.0.0.1,localhost}
      NPCINK_CLOUD_FRONTEND_DEV_HOST_ALLOWLIST: ${NPCINK_CLOUD_M4_FRONTEND_DEV_HOST_ALLOWLIST:-cloud.mqzjmax.top,127.0.0.1,localhost}
      NPCINK_CLOUD_SETUP_STATE_OVERRIDE: complete
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok&&!String(r.status).startsWith('3'))process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
