services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: npcink_ai_cloud
      POSTGRES_USER: npcink
      POSTGRES_PASSWORD: npcink
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U npcink -d npcink_ai_cloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cloud-postgres-dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - cloud-redis-dev:/data

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "8010:8080"
    volumes:
      - ./deploy/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        PACKAGE_EXTRAS: "[dev,zilliz]"
    image: npcink-ai-cloud-api:dev
    restart: unless-stopped
    command: >-
      uvicorn app.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir app
      --reload-dir migrations
      --reload-exclude app/workers/*
      --timeout-graceful-shutdown 5
    env_file:
      - ./.env
      - ./.env.local
    environment:
      NPCINK_CLOUD_ENVIRONMENT: development
      NPCINK_CLOUD_LOG_LEVEL: DEBUG
      NPCINK_CLOUD_DATABASE_URL: postgresql+psycopg://npcink:npcink@postgres:5432/npcink_ai_cloud
      NPCINK_CLOUD_REDIS_URL: redis://redis:6379/0
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_PORTAL_JWT_SECRET: ${NPCINK_CLOUD_PORTAL_JWT_SECRET:-dev-portal-preview-token-32-bytes}
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_DEV_OTEL_EXPORTER_OTLP_ENDPOINT:-}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../scripts:/scripts:ro
      - cloud-artifacts-dev:/var/lib/npcink-ai-cloud/artifacts

  worker:
    profiles:
      - runtime
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        PACKAGE_EXTRAS: "[dev,zilliz]"
    image: npcink-ai-cloud-worker:dev
    restart: unless-stopped
    command: python -m app.workers.runtime_queue
    env_file:
      - ./.env
      - ./.env.local
    environment:
      NPCINK_CLOUD_ENVIRONMENT: development
      NPCINK_CLOUD_LOG_LEVEL: DEBUG
      NPCINK_CLOUD_DATABASE_URL: postgresql+psycopg://npcink:npcink@postgres:5432/npcink_ai_cloud
      NPCINK_CLOUD_REDIS_URL: redis://redis:6379/0
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_DEV_OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - cloud-artifacts-dev:/var/lib/npcink-ai-cloud/artifacts

  callback-worker:
    profiles:
      - callback
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        PACKAGE_EXTRAS: "[dev,zilliz]"
    image: npcink-ai-cloud-callback-worker:dev
    restart: unless-stopped
    command: python -m app.workers.callback_dispatch
    env_file:
      - ./.env
      - ./.env.local
    environment:
      NPCINK_CLOUD_ENVIRONMENT: development
      NPCINK_CLOUD_LOG_LEVEL: DEBUG
      NPCINK_CLOUD_DATABASE_URL: postgresql+psycopg://npcink:npcink@postgres:5432/npcink_ai_cloud
      NPCINK_CLOUD_REDIS_URL: redis://redis:6379/0
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_DEV_OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  ops-worker:
    profiles:
      - ops
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        PACKAGE_EXTRAS: "[dev,zilliz]"
    image: npcink-ai-cloud-ops-worker:dev
    restart: unless-stopped
    command: python -m app.workers.ops_cadence
    env_file:
      - ./.env
      - ./.env.local
    environment:
      NPCINK_CLOUD_ENVIRONMENT: development
      NPCINK_CLOUD_LOG_LEVEL: DEBUG
      NPCINK_CLOUD_DATABASE_URL: postgresql+psycopg://npcink:npcink@postgres:5432/npcink_ai_cloud
      NPCINK_CLOUD_REDIS_URL: redis://redis:6379/0
      NPCINK_CLOUD_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${NPCINK_CLOUD_WORKER_HEARTBEAT_INTERVAL_SECONDS:-60}
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_DEV_OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - cloud-artifacts-dev:/var/lib/npcink-ai-cloud/artifacts

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    image: npcink-ai-cloud-frontend:dev
    restart: unless-stopped
    command: >-
      sh -lc "cd /app &&
      corepack enable &&
      pnpm install --frozen-lockfile --filter frontend... &&
      exec node frontend/node_modules/next/dist/bin/next dev --webpack -H 0.0.0.0"
    environment:
      CLOUD_API_BASE_URL: http://api:8000
      CLOUD_PUBLIC_BASE_URL: ${NPCINK_CLOUD_BASE_URL:-http://127.0.0.1:8010}
      NPCINK_CLOUD_INTERNAL_AUTH_TOKEN: ${NPCINK_CLOUD_INTERNAL_AUTH_TOKEN:-}
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_DEV_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      NODE_OPTIONS: --max-old-space-size=1536
      NEXT_TELEMETRY_DISABLED: "1"
      DISABLE_DEPENDENCY_CHECK: "true"
    expose:
      - "3000"
    volumes:
      - ./frontend:/app/frontend
      - cloud-frontend-node-modules-dev:/app/frontend/node_modules
      - cloud-frontend-next-cache-dev:/app/frontend/.next
    depends_on:
      - api

volumes:
  cloud-artifacts-dev:
  cloud-postgres-dev:
  cloud-redis-dev:
  cloud-frontend-node-modules-dev:
  cloud-frontend-next-cache-dev:
