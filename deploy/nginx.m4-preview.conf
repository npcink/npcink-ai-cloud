map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $npcink_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

log_format npcink_uri_only '$remote_addr [$time_local] '
                           '"$request_method $uri $server_protocol" '
                           '$status $body_bytes_sent $request_time';

limit_req_zone $binary_remote_addr zone=public_runtime:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=health_live:1m rate=5r/s;
limit_req_zone $binary_remote_addr zone=media_upload_rate:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=media_upload_conn:10m;
limit_conn_zone $server_name zone=media_upload_global_conn:1m;
limit_req_zone $binary_remote_addr zone=media_pull_rate:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=media_pull_conn:10m;
limit_conn_zone $server_name zone=media_pull_global_conn:1m;

server {
    listen 8080 default_server;
    server_name _;
    access_log /var/log/nginx/access.log npcink_uri_only;
    client_max_body_size 2m;
    limit_req_status 429;
    limit_conn_status 429;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $npcink_ai_cloud_api api:8000;
    set $npcink_ai_cloud_frontend frontend:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $npcink_forwarded_proto;
    proxy_set_header Connection "";

    location = /docs {
        return 404;
    }

    location = /redoc {
        return 404;
    }

    location = /health/ready {
        return 404;
    }

    location = /health/operational-ready {
        return 404;
    }

    location /internal/ {
        return 404;
    }

    location = /health/live {
        limit_req zone=health_live burst=10 nodelay;
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location = /v1/runtime/media/uploads {
        client_max_body_size 52m;
        client_body_timeout 60s;
        limit_conn media_upload_conn 2;
        limit_conn media_upload_global_conn 8;
        limit_req zone=public_runtime burst=40 nodelay;
        limit_req zone=media_upload_rate burst=4 nodelay;
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location ~ "^/v1/runtime/media/artifacts/art_[0-9a-f]{32}/download$" {
        limit_except GET {
            deny all;
        }
        limit_conn media_pull_conn 4;
        limit_conn media_pull_global_conn 16;
        limit_req zone=public_runtime burst=40 nodelay;
        limit_req zone=media_pull_rate burst=10 nodelay;
        proxy_buffering off;
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /v1/ {
        limit_req zone=public_runtime burst=40 nodelay;
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /portal/v1/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /open/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /static/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /_next/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location /api/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }
}
