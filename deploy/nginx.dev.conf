map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=media_derivative_rate:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=media_derivative_conn:10m;
limit_conn_zone $server_name zone=media_derivative_global_conn:1m;

server {
    listen 8080 default_server;
    server_name _;
    client_max_body_size 2m;
    limit_req_status 429;
    limit_conn_status 429;

    # Resolve Docker service names dynamically so proxying survives dev container
    # restarts and uvicorn reload windows without pinning stale container IPs.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $npcink_ai_cloud_api api:8000;
    set $npcink_ai_cloud_frontend frontend:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location = /health/live {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location = /health/ready {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location = /health/operational-ready {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /internal/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location = /v1/runtime/media-derivatives {
        client_max_body_size 52m;
        client_body_timeout 60s;
        limit_conn media_derivative_conn 2;
        limit_conn media_derivative_global_conn 8;
        limit_req zone=media_derivative_rate burst=4 nodelay;
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /v1/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /portal/v1/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /open/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /static/ {
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /_next/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location /api/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }
}
