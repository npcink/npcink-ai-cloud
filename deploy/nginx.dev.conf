map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080 default_server;
    server_name _;
    client_max_body_size 2m;

    # Resolve Docker service names dynamically so proxying survives dev container
    # restarts and uvicorn reload windows without pinning stale container IPs.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $npcink_ai_cloud_api api:8000;
    set $npcink_ai_cloud_frontend frontend:3000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health/live {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location = /health/ready {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location = /health/operational-ready {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /internal/ {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /v1/ {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /portal/v1/ {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /open/ {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /static/ {
        proxy_set_header Connection "";
        proxy_pass http://$npcink_ai_cloud_api;
    }

    location /_next/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location /api/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }
}
