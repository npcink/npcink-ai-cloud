map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $npcink_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $http_x_forwarded_host $npcink_forwarded_host {
    default $http_x_forwarded_host;
    '' $host;
}

limit_req_zone $binary_remote_addr zone=public_runtime:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=health_live:1m rate=5r/s;

upstream npcink_ai_cloud_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;
    client_max_body_size 1m;
    limit_req_status 429;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $npcink_forwarded_proto;
    proxy_set_header Connection "";
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $npcink_ai_cloud_frontend "frontend:3000";

    location = /docs {
        return 404;
    }

    location = /redoc {
        return 404;
    }

    location = /health/ready {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location = /health/operational-ready {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location /internal/ {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location = /health/live {
        limit_req zone=health_live burst=10 nodelay;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location = /terms {
        root /usr/share/nginx/html/npcink-site;
        try_files /terms/index.html =404;
    }

    location /terms/ {
        root /usr/share/nginx/html/npcink-site;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /portal/v1/ {
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location /open/ {
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location = / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location = /features {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location = /getting-started {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location = /portal {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location /portal/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location = /admin {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location = /admin/auth/bootstrap {
        proxy_set_header Connection "";
        proxy_set_header Host $npcink_forwarded_host;
        proxy_set_header X-Forwarded-Host $npcink_forwarded_host;
        proxy_set_header X-Forwarded-Proto $npcink_forwarded_proto;
        proxy_set_header X-Forwarded-Port 443;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location /admin/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location /_next/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location /api/ {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://$npcink_ai_cloud_frontend;
    }

    location /static/ {
        proxy_pass http://npcink_ai_cloud_api;
    }

    location /v1/ {
        limit_req zone=public_runtime burst=40 nodelay;
        proxy_connect_timeout 5s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_pass http://npcink_ai_cloud_api;
    }

    location / {
        return 404;
    }
}
