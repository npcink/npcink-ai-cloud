x-proof-app: &proof-app
  image: ${P5_B4_PROOF_IMAGE:?P5_B4_PROOF_IMAGE must be set}
  environment: *proof-environment
  networks:
    - proof-internal
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777

services:
  proof-postgres:
    image: ${P5_B4_POSTGRES_IMAGE_REF:-postgres:16-alpine}
    environment:
      POSTGRES_DB: npcink_p5_b4_proof
      POSTGRES_USER: npcink_p5_b4
      POSTGRES_PASSWORD: p5-b4-disposable-postgres-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U npcink_p5_b4 -d npcink_p5_b4_proof"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      - proof-internal
    volumes:
      - proof-postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

  proof-redis:
    image: ${P5_B4_REDIS_IMAGE_REF:-redis:7-alpine}
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-n", "15", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      - proof-internal
    volumes:
      - proof-redis-data:/data
    security_opt:
      - no-new-privileges:true

  proof-provider:
    <<: *proof-app
    command:
      - python
      - scripts/p5_b4_runtime_load_soak.py
      - --confirm-disposable
      - serve-provider
    depends_on:
      proof-redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          raise SystemExit(0 if urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2).status == 200 else 1)
      interval: 2s
      timeout: 3s
      retries: 30

  proof-api:
    <<: *proof-app
    command:
      - gunicorn
      - app.api.main:app
      - --workers
      - "2"
      - --worker-class
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
      - --timeout
      - "60"
      - --keep-alive
      - "10"
      - --access-logfile
      - /dev/null
      - --error-logfile
      - "-"
      - --log-level
      - warning
    depends_on:
      proof-postgres:
        condition: service_healthy
      proof-redis:
        condition: service_healthy
      proof-provider:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          request=urllib.request.Request('http://127.0.0.1:8000/health/ready', headers={'X-Npcink-Internal-Token':'p5-b4-disposable-internal-token-32b'});
          raise SystemExit(0 if urllib.request.urlopen(request, timeout=3).status == 200 else 1)
      interval: 2s
      timeout: 4s
      retries: 30
    volumes:
      - proof-artifacts:/proof-artifacts
    stop_grace_period: 15s

  proof-worker:
    <<: *proof-app
    command: ["python", "-m", "app.workers.runtime_queue"]
    deploy:
      replicas: 2
    depends_on:
      proof-postgres:
        condition: service_healthy
      proof-redis:
        condition: service_healthy
      proof-provider:
        condition: service_healthy
    volumes:
      - proof-artifacts:/proof-artifacts
    stop_grace_period: 15s

  proof-runner:
    <<: *proof-app
    user: ${P5_B4_RUNNER_UID:?P5_B4_RUNNER_UID must be set}:${P5_B4_RUNNER_GID:?P5_B4_RUNNER_GID must be set}
    profiles:
      - proof
    command: ["python", "scripts/p5_b4_runtime_load_soak.py", "--help"]
    depends_on:
      proof-postgres:
        condition: service_healthy
      proof-redis:
        condition: service_healthy
    volumes:
      - proof-artifacts:/proof-artifacts
      - ${P5_B4_EVIDENCE_DIR:?P5_B4_EVIDENCE_DIR must be set}:/proof-evidence

networks:
  proof-internal:
    internal: true

volumes:
  proof-postgres-data:
  proof-redis-data:
  proof-artifacts:
