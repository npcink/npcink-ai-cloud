      NPCINK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND: ${NPCINK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND:-postgres_json}
      NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER: ${NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER:-deterministic}
      NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_MODEL: ${NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_MODEL:-BAAI/bge-m3}
      NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_DIMENSIONS: ${NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_DIMENSIONS:-1024}
      NPCINK_CLOUD_SITE_KNOWLEDGE_VECTOR_METRIC_TYPE: ${NPCINK_CLOUD_SITE_KNOWLEDGE_VECTOR_METRIC_TYPE:-COSINE}
      NPCINK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED: ${NPCINK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED:-false}
      NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER: ${NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER:-disabled}
      NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K: ${NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K:-30}
      NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_TIMEOUT_SECONDS: ${NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_TIMEOUT_SECONDS:-8}
