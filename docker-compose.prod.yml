      NPCINK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS: ${NPCINK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_LITELLM_BASE_URL: ${NPCINK_CLOUD_LITELLM_BASE_URL:-}
      NPCINK_CLOUD_LITELLM_API_KEY: ${NPCINK_CLOUD_LITELLM_API_KEY:-}
      NPCINK_CLOUD_LITELLM_TIMEOUT_SECONDS: ${NPCINK_CLOUD_LITELLM_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_VLLM_PROVIDER_ENABLED: ${NPCINK_CLOUD_VLLM_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_VLLM_BASE_URL: ${NPCINK_CLOUD_VLLM_BASE_URL:-}
      NPCINK_CLOUD_VLLM_API_KEY: ${NPCINK_CLOUD_VLLM_API_KEY:-}
      NPCINK_CLOUD_VLLM_TIMEOUT_SECONDS: ${NPCINK_CLOUD_VLLM_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_TEI_PROVIDER_ENABLED: ${NPCINK_CLOUD_TEI_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_TEI_BASE_URL: ${NPCINK_CLOUD_TEI_BASE_URL:-}
      NPCINK_CLOUD_TEI_API_KEY: ${NPCINK_CLOUD_TEI_API_KEY:-}
      NPCINK_CLOUD_TEI_TIMEOUT_SECONDS: ${NPCINK_CLOUD_TEI_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_TEI_MODEL_IDS: ${NPCINK_CLOUD_TEI_MODEL_IDS:-}
      NPCINK_CLOUD_TEI_REGION: ${NPCINK_CLOUD_TEI_REGION:-self-hosted}
      NPCINK_CLOUD_TEI_CONTEXT_WINDOW: ${NPCINK_CLOUD_TEI_CONTEXT_WINDOW:-8192}
      NPCINK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND: ${NPCINK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND:-postgres_json}
      NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER: ${NPCINK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER:-deterministic}
