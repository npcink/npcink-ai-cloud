      NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TIMEOUT_SECONDS: ${NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TIMEOUT_SECONDS:-10}
      NPCINK_CLOUD_OPENROUTER_PROVIDER_ENABLED: ${NPCINK_CLOUD_OPENROUTER_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_OPENROUTER_BASE_URL: ${NPCINK_CLOUD_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      NPCINK_CLOUD_OPENROUTER_API_KEY: ${NPCINK_CLOUD_OPENROUTER_API_KEY:-}
      NPCINK_CLOUD_OPENROUTER_TIMEOUT_SECONDS: ${NPCINK_CLOUD_OPENROUTER_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_OPENROUTER_SITE_URL: ${NPCINK_CLOUD_OPENROUTER_SITE_URL:-}
      NPCINK_CLOUD_SILICONFLOW_PROVIDER_ENABLED: ${NPCINK_CLOUD_SILICONFLOW_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_SILICONFLOW_BASE_URL: ${NPCINK_CLOUD_SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      NPCINK_CLOUD_SILICONFLOW_API_KEY: ${NPCINK_CLOUD_SILICONFLOW_API_KEY:-}
      NPCINK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS: ${NPCINK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_HUGGINGFACE_BASE_URL: ${NPCINK_CLOUD_HUGGINGFACE_BASE_URL:-https://huggingface.co}
      NPCINK_CLOUD_HUGGINGFACE_API_TOKEN: ${NPCINK_CLOUD_HUGGINGFACE_API_TOKEN:-}
      NPCINK_CLOUD_HUGGINGFACE_TIMEOUT_SECONDS: ${NPCINK_CLOUD_HUGGINGFACE_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_HUGGINGFACE_MODEL_ALLOWLIST: ${NPCINK_CLOUD_HUGGINGFACE_MODEL_ALLOWLIST:-}
      NPCINK_CLOUD_OLLAMA_BASE_URL: ${NPCINK_CLOUD_OLLAMA_BASE_URL:-}
      NPCINK_CLOUD_OLLAMA_TIMEOUT_SECONDS: ${NPCINK_CLOUD_OLLAMA_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_OLLAMA_MODEL_ALLOWLIST: ${NPCINK_CLOUD_OLLAMA_MODEL_ALLOWLIST:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ${NPCINK_CLOUD_FRONTEND_RELEASE_IMAGE:-npcink-ai-cloud-frontend:prod}
    restart: unless-stopped
    environment:
      CLOUD_API_BASE_URL: http://api:8000
      CLOUD_PUBLIC_BASE_URL: ${NPCINK_CLOUD_BASE_URL:-http://127.0.0.1:${NPCINK_CLOUD_PORT:-8010}}
      NPCINK_CLOUD_INTERNAL_AUTH_TOKEN: ${NPCINK_CLOUD_INTERNAL_AUTH_TOKEN:-}
      NODE_ENV: production
    expose:
      - "3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PACKAGE_EXTRAS: ${NPCINK_CLOUD_PACKAGE_EXTRAS:-}
    image: ${NPCINK_CLOUD_WORKER_RELEASE_IMAGE:-npcink-ai-cloud-worker:prod}
    restart: unless-stopped
    command: python -m app.workers.runtime_queue
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NPCINK_CLOUD_ENVIRONMENT: ${NPCINK_CLOUD_ENVIRONMENT:-production}
      NPCINK_CLOUD_LOG_LEVEL: ${NPCINK_CLOUD_LOG_LEVEL:-INFO}
      NPCINK_CLOUD_DATABASE_URL: ${NPCINK_CLOUD_DATABASE_URL?NPCINK_CLOUD_DATABASE_URL is required}
      NPCINK_CLOUD_REDIS_URL: ${NPCINK_CLOUD_REDIS_URL:-redis://redis:6379/0}
      NPCINK_CLOUD_RUNTIME_WORKER_POLL_SECONDS: ${NPCINK_CLOUD_RUNTIME_WORKER_POLL_SECONDS:-5}
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${NPCINK_CLOUD_WORKER_HEARTBEAT_INTERVAL_SECONDS:-60}
      NPCINK_CLOUD_INTERNAL_AUTH_TOKEN: ${NPCINK_CLOUD_INTERNAL_AUTH_TOKEN:-}
      NPCINK_CLOUD_ADMIN_BOOTSTRAP_TOKEN: ${NPCINK_CLOUD_ADMIN_BOOTSTRAP_TOKEN:-}
      NPCINK_CLOUD_ADMIN_SESSION_SECRET: ${NPCINK_CLOUD_ADMIN_SESSION_SECRET:-}
