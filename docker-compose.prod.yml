services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-magick_ai_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-magick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magick} -d ${POSTGRES_DB:-magick_ai_cloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cloud-postgres-prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - cloud-redis-prod:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      MAGICK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${MAGICK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
    volumes:
      - ./deploy/otel-collector.config.yml:/etc/otelcol-contrib/config.yaml:ro

  jaeger:
    image: jaegertracing/all-in-one:1.59
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${MAGICK_CLOUD_JAEGER_UI_PORT:-16686}:16686"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "${MAGICK_CLOUD_PORT:-8010}:8080"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: magick-ai-cloud-api:prod
    restart: unless-stopped
    command: gunicorn -k uvicorn.workers.UvicornWorker -w ${MAGICK_CLOUD_API_WORKERS:-2} -b 0.0.0.0:8000 app.api.main:app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MAGICK_CLOUD_ENVIRONMENT: ${MAGICK_CLOUD_ENVIRONMENT:-production}
      MAGICK_CLOUD_LOG_LEVEL: ${MAGICK_CLOUD_LOG_LEVEL:-INFO}
      MAGICK_CLOUD_DATABASE_URL: ${MAGICK_CLOUD_DATABASE_URL?MAGICK_CLOUD_DATABASE_URL is required}
      MAGICK_CLOUD_REDIS_URL: ${MAGICK_CLOUD_REDIS_URL:-redis://redis:6379/0}
      MAGICK_CLOUD_INTERNAL_AUTH_TOKEN: ${MAGICK_CLOUD_INTERNAL_AUTH_TOKEN:-}
      MAGICK_CLOUD_ADMIN_BOOTSTRAP_TOKEN: ${MAGICK_CLOUD_ADMIN_BOOTSTRAP_TOKEN:-}
      MAGICK_CLOUD_ADMIN_SESSION_SECRET: ${MAGICK_CLOUD_ADMIN_SESSION_SECRET:-}
      MAGICK_CLOUD_ADMIN_SESSION_TTL_SECONDS: ${MAGICK_CLOUD_ADMIN_SESSION_TTL_SECONDS:-28800}
      MAGICK_CLOUD_ADMIN_BOOTSTRAP_ADMIN_REF: ${MAGICK_CLOUD_ADMIN_BOOTSTRAP_ADMIN_REF:-platform:internal_root}
      MAGICK_CLOUD_ADMIN_BOOTSTRAP_ADMIN_ROLE: ${MAGICK_CLOUD_ADMIN_BOOTSTRAP_ADMIN_ROLE:-platform_admin}
      MAGICK_CLOUD_BROWSER_ORIGIN_ALLOWLIST: ${MAGICK_CLOUD_BROWSER_ORIGIN_ALLOWLIST:-}
      MAGICK_CLOUD_TRUSTED_HOST_ALLOWLIST: ${MAGICK_CLOUD_TRUSTED_HOST_ALLOWLIST:-}
      MAGICK_CLOUD_PORTAL_JWT_SECRET: ${MAGICK_CLOUD_PORTAL_JWT_SECRET:-}
      MAGICK_CLOUD_PORTAL_JWT_ISSUER: ${MAGICK_CLOUD_PORTAL_JWT_ISSUER:-}
      MAGICK_CLOUD_PORTAL_JWT_AUDIENCE: ${MAGICK_CLOUD_PORTAL_JWT_AUDIENCE:-}
      MAGICK_CLOUD_PORTAL_SESSION_TTL_SECONDS: ${MAGICK_CLOUD_PORTAL_SESSION_TTL_SECONDS:-28800}
      MAGICK_CLOUD_PORTAL_PUBLIC_BASE_URL: ${MAGICK_CLOUD_PORTAL_PUBLIC_BASE_URL:-}
      MAGICK_CLOUD_PORTAL_EMAIL_SMTP_HOST: ${MAGICK_CLOUD_PORTAL_EMAIL_SMTP_HOST:-}
      MAGICK_CLOUD_PORTAL_EMAIL_SMTP_PORT: ${MAGICK_CLOUD_PORTAL_EMAIL_SMTP_PORT:-465}
      MAGICK_CLOUD_PORTAL_EMAIL_SMTP_USERNAME: ${MAGICK_CLOUD_PORTAL_EMAIL_SMTP_USERNAME:-}
      MAGICK_CLOUD_PORTAL_EMAIL_SMTP_PASSWORD: ${MAGICK_CLOUD_PORTAL_EMAIL_SMTP_PASSWORD:-}
      MAGICK_CLOUD_PORTAL_EMAIL_SMTP_USE_SSL: ${MAGICK_CLOUD_PORTAL_EMAIL_SMTP_USE_SSL:-true}
      MAGICK_CLOUD_PORTAL_EMAIL_SMTP_USE_STARTTLS: ${MAGICK_CLOUD_PORTAL_EMAIL_SMTP_USE_STARTTLS:-false}
      MAGICK_CLOUD_PORTAL_EMAIL_FROM_EMAIL: ${MAGICK_CLOUD_PORTAL_EMAIL_FROM_EMAIL:-}
      MAGICK_CLOUD_PORTAL_EMAIL_FROM_NAME: ${MAGICK_CLOUD_PORTAL_EMAIL_FROM_NAME:-}
      MAGICK_CLOUD_PORTAL_EMAIL_REPLY_TO: ${MAGICK_CLOUD_PORTAL_EMAIL_REPLY_TO:-}
      MAGICK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${MAGICK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      MAGICK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${MAGICK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
      MAGICK_CLOUD_OTEL_TRACE_QUERY_URL: ${MAGICK_CLOUD_OTEL_TRACE_QUERY_URL:-http://127.0.0.1:${MAGICK_CLOUD_JAEGER_UI_PORT:-16686}}
      MAGICK_CLOUD_OPENAI_BASE_URL: ${MAGICK_CLOUD_OPENAI_BASE_URL:-https://api.openai.com/v1}
      MAGICK_CLOUD_OPENAI_API_KEY: ${MAGICK_CLOUD_OPENAI_API_KEY:-}
      MAGICK_CLOUD_OPENAI_ORGANIZATION: ${MAGICK_CLOUD_OPENAI_ORGANIZATION:-}
      MAGICK_CLOUD_OPENAI_TIMEOUT_SECONDS: ${MAGICK_CLOUD_OPENAI_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_OPENAI_SAMPLE_CATALOG_PROFILE: ${MAGICK_CLOUD_OPENAI_SAMPLE_CATALOG_PROFILE:-}
      MAGICK_CLOUD_LITELLM_PROVIDER_ENABLED: ${MAGICK_CLOUD_LITELLM_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_ANTHROPIC_BASE_URL: ${MAGICK_CLOUD_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      MAGICK_CLOUD_ANTHROPIC_API_KEY: ${MAGICK_CLOUD_ANTHROPIC_API_KEY:-}
      MAGICK_CLOUD_ANTHROPIC_VERSION: ${MAGICK_CLOUD_ANTHROPIC_VERSION:-2023-06-01}
      MAGICK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS: ${MAGICK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_LITELLM_BASE_URL: ${MAGICK_CLOUD_LITELLM_BASE_URL:-}
      MAGICK_CLOUD_LITELLM_API_KEY: ${MAGICK_CLOUD_LITELLM_API_KEY:-}
      MAGICK_CLOUD_LITELLM_TIMEOUT_SECONDS: ${MAGICK_CLOUD_LITELLM_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_VLLM_PROVIDER_ENABLED: ${MAGICK_CLOUD_VLLM_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_VLLM_BASE_URL: ${MAGICK_CLOUD_VLLM_BASE_URL:-}
      MAGICK_CLOUD_VLLM_API_KEY: ${MAGICK_CLOUD_VLLM_API_KEY:-}
      MAGICK_CLOUD_VLLM_TIMEOUT_SECONDS: ${MAGICK_CLOUD_VLLM_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_TEI_PROVIDER_ENABLED: ${MAGICK_CLOUD_TEI_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_TEI_BASE_URL: ${MAGICK_CLOUD_TEI_BASE_URL:-}
      MAGICK_CLOUD_TEI_API_KEY: ${MAGICK_CLOUD_TEI_API_KEY:-}
      MAGICK_CLOUD_TEI_TIMEOUT_SECONDS: ${MAGICK_CLOUD_TEI_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_TEI_MODEL_IDS: ${MAGICK_CLOUD_TEI_MODEL_IDS:-}
      MAGICK_CLOUD_TEI_REGION: ${MAGICK_CLOUD_TEI_REGION:-self-hosted}
      MAGICK_CLOUD_TEI_CONTEXT_WINDOW: ${MAGICK_CLOUD_TEI_CONTEXT_WINDOW:-8192}
      MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND: ${MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND:-postgres_json}
      MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER: ${MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER:-deterministic}
      MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_MODEL: ${MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_MODEL:-BAAI/bge-m3}
      MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_DIMENSIONS: ${MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_DIMENSIONS:-1024}
      MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_METRIC_TYPE: ${MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_METRIC_TYPE:-COSINE}
      MAGICK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED: ${MAGICK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED:-false}
      MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER: ${MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER:-disabled}
      MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K: ${MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K:-30}
      MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TIMEOUT_SECONDS: ${MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TIMEOUT_SECONDS:-8}
      MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_BASE_URL: ${MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_BASE_URL:-https://api.jina.ai}
      MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_API_KEY: ${MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_API_KEY:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_RERANK_MODEL: ${MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_RERANK_MODEL:-jina-reranker-v3}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_URI: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_URI:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TOKEN: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TOKEN:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_DATABASE: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_DATABASE:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_COLLECTION: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_COLLECTION:-magick_site_knowledge_chunks}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TIMEOUT_SECONDS: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TIMEOUT_SECONDS:-10}
      MAGICK_CLOUD_OPENROUTER_PROVIDER_ENABLED: ${MAGICK_CLOUD_OPENROUTER_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_OPENROUTER_BASE_URL: ${MAGICK_CLOUD_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      MAGICK_CLOUD_OPENROUTER_API_KEY: ${MAGICK_CLOUD_OPENROUTER_API_KEY:-}
      MAGICK_CLOUD_OPENROUTER_TIMEOUT_SECONDS: ${MAGICK_CLOUD_OPENROUTER_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_OPENROUTER_SITE_URL: ${MAGICK_CLOUD_OPENROUTER_SITE_URL:-}
      MAGICK_CLOUD_SILICONFLOW_PROVIDER_ENABLED: ${MAGICK_CLOUD_SILICONFLOW_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_SILICONFLOW_BASE_URL: ${MAGICK_CLOUD_SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      MAGICK_CLOUD_SILICONFLOW_API_KEY: ${MAGICK_CLOUD_SILICONFLOW_API_KEY:-}
      MAGICK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS: ${MAGICK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_HUGGINGFACE_BASE_URL: ${MAGICK_CLOUD_HUGGINGFACE_BASE_URL:-https://huggingface.co}
      MAGICK_CLOUD_HUGGINGFACE_API_TOKEN: ${MAGICK_CLOUD_HUGGINGFACE_API_TOKEN:-}
      MAGICK_CLOUD_HUGGINGFACE_TIMEOUT_SECONDS: ${MAGICK_CLOUD_HUGGINGFACE_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_HUGGINGFACE_MODEL_ALLOWLIST: ${MAGICK_CLOUD_HUGGINGFACE_MODEL_ALLOWLIST:-}
      MAGICK_CLOUD_OLLAMA_BASE_URL: ${MAGICK_CLOUD_OLLAMA_BASE_URL:-}
      MAGICK_CLOUD_OLLAMA_TIMEOUT_SECONDS: ${MAGICK_CLOUD_OLLAMA_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_OLLAMA_MODEL_ALLOWLIST: ${MAGICK_CLOUD_OLLAMA_MODEL_ALLOWLIST:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: magick-ai-cloud-frontend:prod
    restart: unless-stopped
    environment:
      CLOUD_API_BASE_URL: http://api:8000
      CLOUD_PUBLIC_BASE_URL: ${MAGICK_CLOUD_PORTAL_PUBLIC_BASE_URL:-${MAGICK_CLOUD_BASE_URL:-http://127.0.0.1:${MAGICK_CLOUD_PORT:-8010}}}
      MAGICK_CLOUD_INTERNAL_AUTH_TOKEN: ${MAGICK_CLOUD_INTERNAL_AUTH_TOKEN:-}
      NODE_ENV: production
    expose:
      - "3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: magick-ai-cloud-worker:prod
    restart: unless-stopped
    command: python -m app.workers.runtime_queue
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MAGICK_CLOUD_ENVIRONMENT: ${MAGICK_CLOUD_ENVIRONMENT:-production}
      MAGICK_CLOUD_LOG_LEVEL: ${MAGICK_CLOUD_LOG_LEVEL:-INFO}
      MAGICK_CLOUD_DATABASE_URL: ${MAGICK_CLOUD_DATABASE_URL?MAGICK_CLOUD_DATABASE_URL is required}
      MAGICK_CLOUD_REDIS_URL: ${MAGICK_CLOUD_REDIS_URL:-redis://redis:6379/0}
      MAGICK_CLOUD_RUNTIME_WORKER_POLL_SECONDS: ${MAGICK_CLOUD_RUNTIME_WORKER_POLL_SECONDS:-5}
      MAGICK_CLOUD_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${MAGICK_CLOUD_WORKER_HEARTBEAT_INTERVAL_SECONDS:-60}
      MAGICK_CLOUD_INTERNAL_AUTH_TOKEN: ${MAGICK_CLOUD_INTERNAL_AUTH_TOKEN:-}
      MAGICK_CLOUD_ADMIN_BOOTSTRAP_TOKEN: ${MAGICK_CLOUD_ADMIN_BOOTSTRAP_TOKEN:-}
      MAGICK_CLOUD_ADMIN_SESSION_SECRET: ${MAGICK_CLOUD_ADMIN_SESSION_SECRET:-}
      MAGICK_CLOUD_PORTAL_PUBLIC_BASE_URL: ${MAGICK_CLOUD_PORTAL_PUBLIC_BASE_URL:-}
      MAGICK_CLOUD_PORTAL_JWT_SECRET: ${MAGICK_CLOUD_PORTAL_JWT_SECRET:-}
      MAGICK_CLOUD_PORTAL_EMAIL_SMTP_HOST: ${MAGICK_CLOUD_PORTAL_EMAIL_SMTP_HOST:-}
      MAGICK_CLOUD_PORTAL_EMAIL_FROM_EMAIL: ${MAGICK_CLOUD_PORTAL_EMAIL_FROM_EMAIL:-}
      MAGICK_CLOUD_BROWSER_ORIGIN_ALLOWLIST: ${MAGICK_CLOUD_BROWSER_ORIGIN_ALLOWLIST:-}
      MAGICK_CLOUD_TRUSTED_HOST_ALLOWLIST: ${MAGICK_CLOUD_TRUSTED_HOST_ALLOWLIST:-}
      MAGICK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${MAGICK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      MAGICK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${MAGICK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
      MAGICK_CLOUD_OPENAI_BASE_URL: ${MAGICK_CLOUD_OPENAI_BASE_URL:-https://api.openai.com/v1}
      MAGICK_CLOUD_OPENAI_API_KEY: ${MAGICK_CLOUD_OPENAI_API_KEY:-}
      MAGICK_CLOUD_OPENAI_ORGANIZATION: ${MAGICK_CLOUD_OPENAI_ORGANIZATION:-}
      MAGICK_CLOUD_OPENAI_TIMEOUT_SECONDS: ${MAGICK_CLOUD_OPENAI_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_OPENAI_SAMPLE_CATALOG_PROFILE: ${MAGICK_CLOUD_OPENAI_SAMPLE_CATALOG_PROFILE:-}
      MAGICK_CLOUD_LITELLM_PROVIDER_ENABLED: ${MAGICK_CLOUD_LITELLM_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_LITELLM_BASE_URL: ${MAGICK_CLOUD_LITELLM_BASE_URL:-}
      MAGICK_CLOUD_LITELLM_API_KEY: ${MAGICK_CLOUD_LITELLM_API_KEY:-}
      MAGICK_CLOUD_LITELLM_TIMEOUT_SECONDS: ${MAGICK_CLOUD_LITELLM_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_VLLM_PROVIDER_ENABLED: ${MAGICK_CLOUD_VLLM_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_VLLM_BASE_URL: ${MAGICK_CLOUD_VLLM_BASE_URL:-}
      MAGICK_CLOUD_VLLM_API_KEY: ${MAGICK_CLOUD_VLLM_API_KEY:-}
      MAGICK_CLOUD_VLLM_TIMEOUT_SECONDS: ${MAGICK_CLOUD_VLLM_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_TEI_PROVIDER_ENABLED: ${MAGICK_CLOUD_TEI_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_TEI_BASE_URL: ${MAGICK_CLOUD_TEI_BASE_URL:-}
      MAGICK_CLOUD_TEI_API_KEY: ${MAGICK_CLOUD_TEI_API_KEY:-}
      MAGICK_CLOUD_TEI_TIMEOUT_SECONDS: ${MAGICK_CLOUD_TEI_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_TEI_MODEL_IDS: ${MAGICK_CLOUD_TEI_MODEL_IDS:-}
      MAGICK_CLOUD_TEI_REGION: ${MAGICK_CLOUD_TEI_REGION:-self-hosted}
      MAGICK_CLOUD_TEI_CONTEXT_WINDOW: ${MAGICK_CLOUD_TEI_CONTEXT_WINDOW:-8192}
      MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND: ${MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_BACKEND:-postgres_json}
      MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER: ${MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_PROVIDER:-deterministic}
      MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_MODEL: ${MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_MODEL:-BAAI/bge-m3}
      MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_DIMENSIONS: ${MAGICK_CLOUD_SITE_KNOWLEDGE_EMBEDDING_DIMENSIONS:-1024}
      MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_METRIC_TYPE: ${MAGICK_CLOUD_SITE_KNOWLEDGE_VECTOR_METRIC_TYPE:-COSINE}
      MAGICK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED: ${MAGICK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED:-false}
      MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER: ${MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER:-disabled}
      MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K: ${MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K:-30}
      MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TIMEOUT_SECONDS: ${MAGICK_CLOUD_SITE_KNOWLEDGE_RERANK_TIMEOUT_SECONDS:-8}
      MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_BASE_URL: ${MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_BASE_URL:-https://api.jina.ai}
      MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_API_KEY: ${MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_API_KEY:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_RERANK_MODEL: ${MAGICK_CLOUD_SITE_KNOWLEDGE_JINA_RERANK_MODEL:-jina-reranker-v3}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_URI: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_URI:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TOKEN: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TOKEN:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_DATABASE: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_DATABASE:-}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_COLLECTION: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_COLLECTION:-magick_site_knowledge_chunks}
      MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TIMEOUT_SECONDS: ${MAGICK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TIMEOUT_SECONDS:-10}
      MAGICK_CLOUD_OPENROUTER_PROVIDER_ENABLED: ${MAGICK_CLOUD_OPENROUTER_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_OPENROUTER_BASE_URL: ${MAGICK_CLOUD_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      MAGICK_CLOUD_OPENROUTER_API_KEY: ${MAGICK_CLOUD_OPENROUTER_API_KEY:-}
      MAGICK_CLOUD_OPENROUTER_TIMEOUT_SECONDS: ${MAGICK_CLOUD_OPENROUTER_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_OPENROUTER_SITE_URL: ${MAGICK_CLOUD_OPENROUTER_SITE_URL:-}
      MAGICK_CLOUD_SILICONFLOW_PROVIDER_ENABLED: ${MAGICK_CLOUD_SILICONFLOW_PROVIDER_ENABLED:-false}
      MAGICK_CLOUD_SILICONFLOW_BASE_URL: ${MAGICK_CLOUD_SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      MAGICK_CLOUD_SILICONFLOW_API_KEY: ${MAGICK_CLOUD_SILICONFLOW_API_KEY:-}
      MAGICK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS: ${MAGICK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS:-30}
      MAGICK_CLOUD_ANTHROPIC_BASE_URL: ${MAGICK_CLOUD_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      MAGICK_CLOUD_ANTHROPIC_API_KEY: ${MAGICK_CLOUD_ANTHROPIC_API_KEY:-}
      MAGICK_CLOUD_ANTHROPIC_VERSION: ${MAGICK_CLOUD_ANTHROPIC_VERSION:-2023-06-01}
      MAGICK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS: ${MAGICK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started

  callback-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: magick-ai-cloud-callback-worker:prod
    restart: unless-stopped
    command: python -m app.workers.callback_dispatch
    extra_hosts:
