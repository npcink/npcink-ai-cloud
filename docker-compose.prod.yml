      NPCINK_CLOUD_OPENROUTER_API_KEY: ${NPCINK_CLOUD_OPENROUTER_API_KEY:-}
      NPCINK_CLOUD_OPENROUTER_TIMEOUT_SECONDS: ${NPCINK_CLOUD_OPENROUTER_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_OPENROUTER_SITE_URL: ${NPCINK_CLOUD_OPENROUTER_SITE_URL:-}
      NPCINK_CLOUD_SILICONFLOW_PROVIDER_ENABLED: ${NPCINK_CLOUD_SILICONFLOW_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_SILICONFLOW_BASE_URL: ${NPCINK_CLOUD_SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      NPCINK_CLOUD_SILICONFLOW_API_KEY: ${NPCINK_CLOUD_SILICONFLOW_API_KEY:-}
      NPCINK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS: ${NPCINK_CLOUD_SILICONFLOW_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_ANTHROPIC_BASE_URL: ${NPCINK_CLOUD_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      NPCINK_CLOUD_ANTHROPIC_API_KEY: ${NPCINK_CLOUD_ANTHROPIC_API_KEY:-}
      NPCINK_CLOUD_ANTHROPIC_VERSION: ${NPCINK_CLOUD_ANTHROPIC_VERSION:-2023-06-01}
      NPCINK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS: ${NPCINK_CLOUD_ANTHROPIC_TIMEOUT_SECONDS:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  callback-worker:
    build:
      context: .
