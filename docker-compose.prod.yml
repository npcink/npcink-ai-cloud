      NPCINK_CLOUD_LITELLM_TIMEOUT_SECONDS: ${NPCINK_CLOUD_LITELLM_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_VLLM_PROVIDER_ENABLED: ${NPCINK_CLOUD_VLLM_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_VLLM_BASE_URL: ${NPCINK_CLOUD_VLLM_BASE_URL:-}
      NPCINK_CLOUD_VLLM_API_KEY: ${NPCINK_CLOUD_VLLM_API_KEY:-}
      NPCINK_CLOUD_VLLM_TIMEOUT_SECONDS: ${NPCINK_CLOUD_VLLM_TIMEOUT_SECONDS:-30}
      NPCINK_CLOUD_TEI_PROVIDER_ENABLED: ${NPCINK_CLOUD_TEI_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_TEI_BASE_URL: ${NPCINK_CLOUD_TEI_BASE_URL:-}
      NPCINK_CLOUD_TEI_API_KEY: ${NPCINK_CLOUD_TEI_API_KEY:-}
      NPCINK_CLOUD_TEI_TIMEOUT_SECONDS: ${NPCINK_CLOUD_TEI_TIMEOUT_SECONDS:-30}
