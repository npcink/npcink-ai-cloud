      NPCINK_CLOUD_SITE_KNOWLEDGE_JINA_BASE_URL: ${NPCINK_CLOUD_SITE_KNOWLEDGE_JINA_BASE_URL:-https://api.jina.ai}
      NPCINK_CLOUD_SITE_KNOWLEDGE_JINA_API_KEY: ${NPCINK_CLOUD_SITE_KNOWLEDGE_JINA_API_KEY:-}
      NPCINK_CLOUD_SITE_KNOWLEDGE_JINA_RERANK_MODEL: ${NPCINK_CLOUD_SITE_KNOWLEDGE_JINA_RERANK_MODEL:-jina-reranker-v3}
      NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_URI: ${NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_URI:-}
      NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TOKEN: ${NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_TOKEN:-}
      NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_DATABASE: ${NPCINK_CLOUD_SITE_KNOWLEDGE_ZILLIZ_DATABASE:-}
