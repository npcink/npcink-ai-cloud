      NPCINK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED: ${NPCINK_CLOUD_SITE_KNOWLEDGE_COMMENTS_ENABLED:-false}
      NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER: ${NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_PROVIDER:-disabled}
      NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K: ${NPCINK_CLOUD_SITE_KNOWLEDGE_RERANK_TOP_K:-30}
