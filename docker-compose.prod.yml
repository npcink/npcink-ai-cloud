services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: ${NPCINK_CLOUD_POSTGRES_RELEASE_IMAGE:-npcink-ai-cloud-postgres:prod}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-npcink_ai_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-npcink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npcink} -d ${POSTGRES_DB:-npcink_ai_cloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cloud-postgres-prod:/var/lib/postgresql/data

  redis:
    image: ${NPCINK_CLOUD_REDIS_RELEASE_IMAGE:-npcink-ai-cloud-external-redis:prod}
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - cloud-redis-prod:/data

  proxy:
    image: ${NPCINK_CLOUD_PROXY_RELEASE_IMAGE:-npcink-ai-cloud-external-nginx:prod}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "127.0.0.1:${NPCINK_CLOUD_PORT:-8010}:8080"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./site:/usr/share/nginx/html/npcink-site:ro
    networks:
      default:
        ipv4_address: 172.28.0.10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PACKAGE_EXTRAS: ${NPCINK_CLOUD_PACKAGE_EXTRAS:-}
    image: ${NPCINK_CLOUD_API_RELEASE_IMAGE:-npcink-ai-cloud-api:prod}
    restart: unless-stopped
    command: >-
      gunicorn -k uvicorn.workers.UvicornWorker
      --forwarded-allow-ips 172.28.0.10
      -w ${NPCINK_CLOUD_API_WORKERS:-2}
      -b 0.0.0.0:8000
      app.api.main:app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NPCINK_CLOUD_ENVIRONMENT: ${NPCINK_CLOUD_ENVIRONMENT:-production}
      NPCINK_CLOUD_LOG_LEVEL: ${NPCINK_CLOUD_LOG_LEVEL:-INFO}
      NPCINK_CLOUD_DATABASE_URL: ${NPCINK_CLOUD_DATABASE_URL?NPCINK_CLOUD_DATABASE_URL is required}
      NPCINK_CLOUD_REDIS_URL: ${NPCINK_CLOUD_REDIS_URL:-redis://redis:6379/0}
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_INTERNAL_AUTH_TOKEN: ${NPCINK_CLOUD_INTERNAL_AUTH_TOKEN:-}
      NPCINK_CLOUD_ADMIN_BOOTSTRAP_TOKEN: ${NPCINK_CLOUD_ADMIN_BOOTSTRAP_TOKEN:-}
      NPCINK_CLOUD_ADMIN_SESSION_SECRET: ${NPCINK_CLOUD_ADMIN_SESSION_SECRET:-}
      NPCINK_CLOUD_SERVICE_SETTINGS_SECRET: ${NPCINK_CLOUD_SERVICE_SETTINGS_SECRET:-}
      NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID: ${NPCINK_CLOUD_SERVICE_SETTINGS_ENCRYPTION_KEY_ID:-}
      NPCINK_CLOUD_RUNTIME_DATA_ENCRYPTION_SECRET: ${NPCINK_CLOUD_RUNTIME_DATA_ENCRYPTION_SECRET:-}
      NPCINK_CLOUD_RUNTIME_DATA_ENCRYPTION_KEY_ID: ${NPCINK_CLOUD_RUNTIME_DATA_ENCRYPTION_KEY_ID:-}
      NPCINK_CLOUD_ADMIN_SESSION_TTL_SECONDS: ${NPCINK_CLOUD_ADMIN_SESSION_TTL_SECONDS:-28800}
      NPCINK_CLOUD_ADMIN_BOOTSTRAP_PRINCIPAL_ID: ${NPCINK_CLOUD_ADMIN_BOOTSTRAP_PRINCIPAL_ID:-platform:internal_root}
      NPCINK_CLOUD_ADMIN_BOOTSTRAP_PLATFORM_ADMIN_ROLE: ${NPCINK_CLOUD_ADMIN_BOOTSTRAP_PLATFORM_ADMIN_ROLE:-platform_admin}
      NPCINK_CLOUD_BROWSER_ORIGIN_ALLOWLIST: ${NPCINK_CLOUD_BROWSER_ORIGIN_ALLOWLIST:-}
      NPCINK_CLOUD_TRUSTED_HOST_ALLOWLIST: ${NPCINK_CLOUD_TRUSTED_HOST_ALLOWLIST:-}
      NPCINK_CLOUD_PORTAL_JWT_SECRET: ${NPCINK_CLOUD_PORTAL_JWT_SECRET:-}
      NPCINK_CLOUD_PORTAL_JWT_ISSUER: ${NPCINK_CLOUD_PORTAL_JWT_ISSUER:-npcink-ai-cloud}
      NPCINK_CLOUD_PORTAL_JWT_AUDIENCE: ${NPCINK_CLOUD_PORTAL_JWT_AUDIENCE:-npcink-ai-cloud-portal}
      NPCINK_CLOUD_PORTAL_SESSION_TTL_SECONDS: ${NPCINK_CLOUD_PORTAL_SESSION_TTL_SECONDS:-28800}
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      NPCINK_CLOUD_OTEL_TRACE_QUERY_URL: ${NPCINK_CLOUD_OTEL_TRACE_QUERY_URL:-}
      NPCINK_CLOUD_OPENAI_BASE_URL: ${NPCINK_CLOUD_OPENAI_BASE_URL:-https://api.openai.com/v1}
      NPCINK_CLOUD_OPENAI_API_KEY: ${NPCINK_CLOUD_OPENAI_API_KEY:-}
      NPCINK_CLOUD_OPENAI_ORGANIZATION: ${NPCINK_CLOUD_OPENAI_ORGANIZATION:-}
      NPCINK_CLOUD_OPENAI_TIMEOUT_SECONDS: ${NPCINK_CLOUD_OPENAI_TIMEOUT_SECONDS:-60}
      NPCINK_CLOUD_OPENAI_SAMPLE_CATALOG_PROFILE: ${NPCINK_CLOUD_OPENAI_SAMPLE_CATALOG_PROFILE:-}
      NPCINK_CLOUD_LITELLM_PROVIDER_ENABLED: ${NPCINK_CLOUD_LITELLM_PROVIDER_ENABLED:-false}
      NPCINK_CLOUD_ANTHROPIC_BASE_URL: ${NPCINK_CLOUD_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
