version: 2
# Pre-refactor freeze: keep security updates available while pausing scheduled
# version-update pull requests. Restore a positive limit after the refactor.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - npm

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - npm

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - python
