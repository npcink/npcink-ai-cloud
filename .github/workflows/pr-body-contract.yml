name: PR Body Contract

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-body-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-body-contract:
    name: PR body contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate human or trusted Dependabot contract
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/check_pr_body_contract.py
