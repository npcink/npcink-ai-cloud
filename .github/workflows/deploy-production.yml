name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to cloud.npc.ink
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    environment: production
    permissions:
      actions: write
      contents: read
    steps:
      - name: Validate deploy trigger
        id: deploy_guard
        run: |
          set -euo pipefail
          should_deploy="false"
          workflow_run_conclusion=""
          workflow_run_head_branch=""
          workflow_run_head_sha=""

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF}" = "refs/heads/production" ]; then
              should_deploy="true"
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            read -r workflow_run_conclusion workflow_run_head_branch workflow_run_head_sha < <(
              python3 - <<'PY'
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as handle:
              event = json.load(handle)
          workflow_run = event.get("workflow_run") or {}
          print(
              workflow_run.get("conclusion") or "",
              workflow_run.get("head_branch") or "",
              workflow_run.get("head_sha") or "",
          )
          PY
            )
            if [ "${workflow_run_conclusion}" = "success" ] && [ "${workflow_run_head_branch}" = "production" ]; then
              should_deploy="true"
            fi
          fi

          echo "should_deploy=${should_deploy}" >> "${GITHUB_OUTPUT}"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "workflow_run_conclusion=${workflow_run_conclusion}"
          echo "workflow_run_head_branch=${workflow_run_head_branch}"
          echo "workflow_run_head_sha=${workflow_run_head_sha}"
          echo "should_deploy=${should_deploy}"

      - name: Checkout
        if: steps.deploy_guard.outputs.should_deploy == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.deploy_guard.outputs.should_deploy == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.deploy_guard.outputs.should_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Docker Buildx
        if: steps.deploy_guard.outputs.should_deploy == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Install SSH key
        if: steps.deploy_guard.outputs.should_deploy == 'true'
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          test -n "${PROD_SSH_KEY}"
          test -n "${PROD_SSH_HOST}"
          mkdir -p ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/npcink_prod_deploy_key
          chmod 600 ~/.ssh/npcink_prod_deploy_key
          ssh-keyscan -p "${PROD_SSH_PORT}" -H "${PROD_SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy
        if: steps.deploy_guard.outputs.should_deploy == 'true'
        env:
          NPCINK_CLOUD_DEPLOY_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          NPCINK_CLOUD_DEPLOY_SSH_USER: ${{ secrets.PROD_SSH_USER || 'deploy' }}
          NPCINK_CLOUD_DEPLOY_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
          NPCINK_CLOUD_DEPLOY_IDENTITY_FILE: /home/runner/.ssh/npcink_prod_deploy_key
          NPCINK_CLOUD_DEPLOY_REMOTE_DIR: ${{ secrets.PROD_REMOTE_DIR || '/opt/npcink-ai-cloud' }}
          NPCINK_CLOUD_BASE_URL: ${{ secrets.PROD_BASE_URL || 'https://cloud.npc.ink' }}
          NPCINK_CLOUD_REMOTE_COMPOSE_FILE: docker-compose.runtime.yml
          NPCINK_CLOUD_INCLUDE_EXTERNAL_IMAGES: ${{ vars.PROD_INCLUDE_EXTERNAL_IMAGES || '0' }}
          NPCINK_CLOUD_REFRESH_PROVIDERS: "1"
          NPCINK_CLOUD_WITH_OPERATIONAL_READY: "1"
        run: |
          set -euo pipefail
          bash deploy/deploy-to-ssh-host.sh \
            --skip-seed \
            --skip-smoke \
            --refresh-providers \
            --with-operational-ready \
            --remote-compose-file docker-compose.runtime.yml
