name: Cloud CI

on:
  push:
    branches: [master, main, production]
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: cloud-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        with:
          args: detect --source . --baseline-path .gitleaks-baseline.json --redact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  classify:
    runs-on: ubuntu-latest
    outputs:
      deploy_required: ${{ steps.changed.outputs.deploy_required }}
      static_terms_only: ${{ steps.changed.outputs.static_terms_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changed
        run: |
          set -euo pipefail
          deploy_required="true"
          static_terms_only="false"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/production" ]; then
            mapfile -t changed_files < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
            if [ "${#changed_files[@]}" -gt 0 ]; then
              static_terms_only="true"
              deploy_required="false"
              for changed_file in "${changed_files[@]}"; do
                if [[ "${changed_file}" != site/terms/* ]]; then
                  static_terms_only="false"
                fi
                case "${changed_file}" in
                  .github/workflows/ci.yml|.github/workflows/deploy-production.yml|docker-compose*.yml|Dockerfile|deploy/*.sh)
                    deploy_required="true"
                    ;;
                  .github/*|.github/workflows/*|docs/*|docs/**/*|tests/*|tests/**/*|deploy/RELEASE_CHECKLIST.md)
                    ;;
                  site/terms/*)
                    deploy_required="true"
                    ;;
                  *)
                    deploy_required="true"
                    ;;
                esac
              done
            fi
          fi

          printf 'deploy_required=%s\n' "${deploy_required}" >> "${GITHUB_OUTPUT}"
          printf 'static_terms_only=%s\n' "${static_terms_only}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_required=%s\n' "${deploy_required}"
          printf 'static_terms_only=%s\n' "${static_terms_only}"

  backend-scope:
    needs: [classify]
    if: needs.classify.outputs.static_terms_only != 'true'
    runs-on: ubuntu-latest
    outputs:
      requires_full_backend: ${{ steps.scope.outputs.requires_full_backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify backend gate scope
        id: scope
        run: bash scripts/check-pr-backend-gate.sh --classify-only

  backend-targeted:
    needs: [classify, backend-scope]
    if: needs.classify.outputs.static_terms_only != 'true' && github.event_name == 'pull_request' && needs['backend-scope'].outputs.requires_full_backend != '1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Bootstrap Cloud Dev Environment
        run: make bootstrap-dev

      - name: PR backend fast gate
        run: bash scripts/check-pr-backend-gate.sh --targeted-only

  backend-static:
    needs: [classify, backend-scope]
    if: needs.classify.outputs.static_terms_only != 'true' && needs['backend-scope'].outputs.requires_full_backend == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Bootstrap Cloud Dev Environment
        run: make bootstrap-dev

      - name: Anti Drift Unit
        run: pnpm run test:anti-drift

      - name: Ruff
        run: .venv/bin/ruff check .

      - name: Mypy
        run: .venv/bin/mypy app

  backend-pytest:
    needs: [classify, backend-scope]
    if: needs.classify.outputs.static_terms_only != 'true' && needs['backend-scope'].outputs.requires_full_backend == '1'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Bootstrap Cloud Dev Environment
        run: make bootstrap-dev

      - name: Select pytest shard
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 scripts/select-pytest-shard.py \
            --shards 3 \
            --shard "${{ matrix.shard }}" \
            tests/api tests/contract tests/domain \
            > "artifacts/pytest-files-shard-${{ matrix.shard }}.txt"
          echo "## Pytest Shard ${{ matrix.shard }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Selected files:" >> "${GITHUB_STEP_SUMMARY}"
          sed 's/^/- `/' "artifacts/pytest-files-shard-${{ matrix.shard }}.txt" \
            | sed 's/$/`/' >> "${GITHUB_STEP_SUMMARY}"

      - name: Pytest
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t pytest_files < "artifacts/pytest-files-shard-${{ matrix.shard }}.txt"
          if [ "${#pytest_files[@]}" -eq 0 ]; then
            echo "No pytest files selected for shard ${{ matrix.shard }}." >&2
            exit 1
          fi
          .venv/bin/python -m pytest "${pytest_files[@]}" -q \
            --junitxml="artifacts/pytest-backend-shard-${{ matrix.shard }}.xml" \
            --durations=25

      - name: Summarize pytest timing
        if: always()
        run: |
          if [ -f "artifacts/pytest-backend-shard-${{ matrix.shard }}.xml" ]; then
            python3 scripts/report-junit-timing.py "artifacts/pytest-backend-shard-${{ matrix.shard }}.xml" --top 25 \
              >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## Pytest Timing Report" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "Pytest timing artifact was not produced." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload pytest timing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-backend-timing-shard-${{ matrix.shard }}
          path: |
            artifacts/pytest-backend-shard-${{ matrix.shard }}.xml
            artifacts/pytest-files-shard-${{ matrix.shard }}.txt
          if-no-files-found: ignore

  backend:
    name: backend
    needs: [classify, backend-scope, backend-targeted, backend-static, backend-pytest]
    if: always() && needs.classify.outputs.static_terms_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Verify backend gate result
        env:
          BACKEND_SCOPE_RESULT: ${{ needs['backend-scope'].result }}
          BACKEND_TARGETED_RESULT: ${{ needs['backend-targeted'].result }}
          BACKEND_STATIC_RESULT: ${{ needs['backend-static'].result }}
          BACKEND_PYTEST_RESULT: ${{ needs['backend-pytest'].result }}
          REQUIRES_FULL_BACKEND: ${{ needs['backend-scope'].outputs.requires_full_backend }}
        run: |
          set -euo pipefail
          echo "scope=${BACKEND_SCOPE_RESULT}"
          echo "targeted=${BACKEND_TARGETED_RESULT}"
          echo "static=${BACKEND_STATIC_RESULT}"
          echo "pytest=${BACKEND_PYTEST_RESULT}"
          echo "requires_full_backend=${REQUIRES_FULL_BACKEND}"

          if [ "${BACKEND_SCOPE_RESULT}" != "success" ]; then
            echo "backend scope classification did not pass" >&2
            exit 1
          fi

          if [ "${REQUIRES_FULL_BACKEND}" = "1" ]; then
            if [ "${BACKEND_STATIC_RESULT}" != "success" ]; then
              echo "backend static gate did not pass" >&2
              exit 1
            fi
            if [ "${BACKEND_PYTEST_RESULT}" != "success" ]; then
              echo "backend pytest shards did not pass" >&2
              exit 1
            fi
          else
            if [ "${BACKEND_TARGETED_RESULT}" != "success" ]; then
              echo "targeted backend gate did not pass" >&2
              exit 1
            fi
          fi

  frontend:
    needs: [classify]
    if: needs.classify.outputs.static_terms_only != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run type-check

      - name: Frontend Contracts
        run: pnpm run test:contracts

  deploy-production:
    name: Deploy to cloud.npc.ink
    needs: [classify, backend, frontend, static-terms]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/production' && needs.classify.outputs.deploy_required == 'true' && ((needs.classify.outputs.static_terms_only == 'true' && needs['static-terms'].result == 'success') || (needs.classify.outputs.static_terms_only != 'true' && needs.backend.result == 'success' && needs.frontend.result == 'success'))
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.classify.outputs.static_terms_only != 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: needs.classify.outputs.static_terms_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Docker Buildx
        if: needs.classify.outputs.static_terms_only != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Install SSH key
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          test -n "${PROD_SSH_KEY}"
          test -n "${PROD_SSH_HOST}"
          mkdir -p ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/npcink_prod_deploy_key
          chmod 600 ~/.ssh/npcink_prod_deploy_key
          ssh-keyscan -p "${PROD_SSH_PORT}" -H "${PROD_SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy
        if: needs.classify.outputs.static_terms_only != 'true'
        env:
          NPCINK_CLOUD_DEPLOY_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          NPCINK_CLOUD_DEPLOY_SSH_USER: ${{ secrets.PROD_SSH_USER || 'deploy' }}
          NPCINK_CLOUD_DEPLOY_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
          NPCINK_CLOUD_DEPLOY_IDENTITY_FILE: /home/runner/.ssh/npcink_prod_deploy_key
          NPCINK_CLOUD_DEPLOY_REMOTE_DIR: ${{ secrets.PROD_REMOTE_DIR || '/opt/npcink-ai-cloud' }}
          NPCINK_CLOUD_BASE_URL: ${{ secrets.PROD_BASE_URL || 'https://cloud.npc.ink' }}
          NPCINK_CLOUD_REMOTE_COMPOSE_FILE: docker-compose.runtime.yml
          NPCINK_CLOUD_INCLUDE_EXTERNAL_IMAGES: ${{ vars.PROD_INCLUDE_EXTERNAL_IMAGES || '0' }}
          NPCINK_CLOUD_REFRESH_PROVIDERS: "1"
          NPCINK_CLOUD_WITH_OPERATIONAL_READY: "1"
        run: |
          set -euo pipefail
          bash deploy/deploy-to-ssh-host.sh \
            --skip-seed \
            --skip-smoke \
            --refresh-providers \
            --with-operational-ready \
            --remote-compose-file docker-compose.runtime.yml

      - name: Deploy static terms
        if: needs.classify.outputs.static_terms_only == 'true'
        env:
          NPCINK_CLOUD_DEPLOY_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          NPCINK_CLOUD_DEPLOY_SSH_USER: ${{ secrets.PROD_SSH_USER || 'deploy' }}
          NPCINK_CLOUD_DEPLOY_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
          NPCINK_CLOUD_DEPLOY_IDENTITY_FILE: /home/runner/.ssh/npcink_prod_deploy_key
          NPCINK_CLOUD_DEPLOY_REMOTE_DIR: ${{ secrets.PROD_REMOTE_DIR || '/opt/npcink-ai-cloud' }}
          NPCINK_CLOUD_BASE_URL: ${{ secrets.PROD_BASE_URL || 'https://cloud.npc.ink' }}
        run: |
          set -euo pipefail
          bash deploy/deploy-static-terms-to-ssh-host.sh

  static-terms:
    needs: [classify]
    if: needs.classify.outputs.static_terms_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static terms tree
        run: |
          set -euo pipefail
          bash scripts/check-release-policy.sh
          test -f site/terms/index.html
          test -f site/terms/en/terms.html
          test -f site/terms/zh/terms.html
          test -f site/terms/styles.css
          ! find site/terms -name '.DS_Store' -print -quit | grep -q .

  post-production-smoke:
    name: Post-production smoke
    needs: [classify, deploy-production]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/production' && needs.classify.outputs.deploy_required == 'true' && needs.classify.outputs.static_terms_only != 'true' && needs['deploy-production'].result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Small-customer preflight
        env:
          NPCINK_CLOUD_BASE_URL: ${{ secrets.PROD_BASE_URL || 'https://cloud.npc.ink' }}
        run: |
          bash deploy/small-customer-trial-preflight.sh \
            --base-url "${NPCINK_CLOUD_BASE_URL}" \
            --require-alipay-enabled

      - name: Optional formal release smoke
        env:
          NPCINK_CLOUD_BASE_URL: ${{ secrets.PROD_BASE_URL || 'https://cloud.npc.ink' }}
          NPCINK_CLOUD_INTERNAL_AUTH_TOKEN: ${{ secrets.NPCINK_CLOUD_INTERNAL_AUTH_TOKEN }}
          NPCINK_CLOUD_ADMIN_BOOTSTRAP_TOKEN: ${{ secrets.NPCINK_CLOUD_ADMIN_BOOTSTRAP_TOKEN }}
          NPCINK_CLOUD_RELEASE_MEMBER_EMAIL: ${{ secrets.NPCINK_CLOUD_RELEASE_MEMBER_EMAIL }}
          NPCINK_CLOUD_PORTAL_LOGIN_CODE: ${{ secrets.NPCINK_CLOUD_PORTAL_LOGIN_CODE }}
          NPCINK_CLOUD_RELEASE_SITE_ID: ${{ secrets.NPCINK_CLOUD_RELEASE_SITE_ID }}
          NPCINK_CLOUD_RELEASE_KEY_ID: ${{ secrets.NPCINK_CLOUD_RELEASE_KEY_ID }}
          NPCINK_CLOUD_RELEASE_KEY_SECRET: ${{ secrets.NPCINK_CLOUD_RELEASE_KEY_SECRET }}
        run: |
          missing=0
          for key in \
            NPCINK_CLOUD_INTERNAL_AUTH_TOKEN \
            NPCINK_CLOUD_ADMIN_BOOTSTRAP_TOKEN \
            NPCINK_CLOUD_RELEASE_MEMBER_EMAIL \
            NPCINK_CLOUD_PORTAL_LOGIN_CODE \
            NPCINK_CLOUD_RELEASE_SITE_ID \
            NPCINK_CLOUD_RELEASE_KEY_ID \
            NPCINK_CLOUD_RELEASE_KEY_SECRET
          do
            if [ -z "${!key:-}" ]; then
              missing=1
            fi
          done
          if [ "${missing}" = "1" ]; then
            echo "## Formal Release Smoke" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "Skipped because one or more formal release smoke secrets are not configured." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          bash deploy/release-smoke.sh --base-url "${NPCINK_CLOUD_BASE_URL}"

  ci-observability:
    name: CI observability
    needs:
      - secret-scan
      - classify
      - backend
      - frontend
      - deploy-production
      - static-terms
      - post-production-smoke
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Summarize CI timing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! python3 scripts/report-release-timing.py "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" >> "${GITHUB_STEP_SUMMARY}"; then
            echo "## Release Timing Report" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "Timing summary was unavailable for this run." >> "${GITHUB_STEP_SUMMARY}"
          fi
