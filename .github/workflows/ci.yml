name: Cloud CI

on:
  push:
    branches: [master, main, production]
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: cloud-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  classify:
    runs-on: ubuntu-latest
    outputs:
      deploy_required: ${{ steps.changed.outputs.deploy_required }}
      static_terms_only: ${{ steps.changed.outputs.static_terms_only }}
      docs_only: ${{ steps.changed.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            mapfile -t changed_files < <(
              git diff --name-only --diff-filter=ACMRD "${BASE_SHA}...${HEAD_SHA}"
            )
          elif [ -n "${BEFORE_SHA}" ] && [[ ! "${BEFORE_SHA}" =~ ^0+$ ]]; then
            mapfile -t changed_files < <(
              git diff --name-only --diff-filter=ACMRD "${BEFORE_SHA}...${HEAD_SHA}"
            )
          else
            mapfile -t changed_files < <(
              git show --pretty='' --name-only --diff-filter=ACMRD "${HEAD_SHA}"
            )
          fi

          bash scripts/classify-ci-changes.sh "${changed_files[@]}" \
            | tee -a "${GITHUB_OUTPUT}"

  backend-scope:
    needs: [classify]
    if: needs.classify.outputs.static_terms_only != 'true'
    runs-on: ubuntu-latest
    outputs:
      requires_full_backend: ${{ steps.scope.outputs.requires_full_backend || steps.docs_scope.outputs.requires_full_backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify backend gate scope
        id: scope
        if: needs.classify.outputs.docs_only != 'true'
        run: bash scripts/check-pr-backend-gate.sh --classify-only

      - name: Select docs-only backend gate
        id: docs_scope
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "requires_full_backend=0" >> "${GITHUB_OUTPUT}"

  python-dependency-audit:
    name: Python dependency audit
    needs: [classify]
    if: needs.classify.outputs.static_terms_only != 'true' && needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.29

      - name: Audit locked production Python dependencies
        run: bash scripts/check-python-dependency-audit.sh

  production-python-image-smoke:
    name: Python 3.14 Alpine production image smoke
    needs: [classify, backend-scope]
    if: github.event_name == 'pull_request' && needs.classify.outputs.static_terms_only != 'true' && needs['backend-scope'].outputs.requires_full_backend == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python for pinned uvx
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install pinned uv
        run: python -m pip install uv==0.11.29

      - name: Build and verify Python 3.14 Alpine production images
        run: bash scripts/production-python-extras-smoke.sh

  backend-targeted:
    needs: [classify, backend-scope]
    if: needs.classify.outputs.static_terms_only != 'true' && needs['backend-scope'].outputs.requires_full_backend != '1' && (github.event_name == 'pull_request' || needs.classify.outputs.docs_only == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        if: needs.classify.outputs.docs_only != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup pnpm
        if: needs.classify.outputs.docs_only != 'true'
        uses: pnpm/action-setup@v6

      - name: Setup Node
        if: needs.classify.outputs.docs_only != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install uv
        if: needs.classify.outputs.docs_only != 'true'
        run: python -m pip install --upgrade uv

      - name: Bootstrap Cloud Dev Environment
        if: needs.classify.outputs.docs_only != 'true'
        run: make bootstrap-dev

      - name: PR backend fast gate
        if: needs.classify.outputs.docs_only != 'true'
        run: bash scripts/check-pr-backend-gate.sh --targeted-only

      - name: Docs-only gate
        if: needs.classify.outputs.docs_only == 'true'
        env:
          NPCINK_CLOUD_CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          NPCINK_CLOUD_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/check-docs-only.sh

  backend-static:
    needs: [classify, backend-scope]
    if: needs.classify.outputs.static_terms_only != 'true' && needs['backend-scope'].outputs.requires_full_backend == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Bootstrap Cloud Dev Environment
        run: make bootstrap-dev

      - name: Anti Drift Unit
        run: pnpm run test:anti-drift

      - name: Ruff
        run: .venv/bin/ruff check .

      - name: Mypy
        run: .venv/bin/mypy app

  backend-pytest:
    needs: [classify, backend-scope]
    if: needs.classify.outputs.static_terms_only != 'true' && needs['backend-scope'].outputs.requires_full_backend == '1'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Bootstrap Cloud Dev Environment
        run: make bootstrap-dev

      - name: Select pytest shard
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python3 scripts/select-pytest-shard.py \
            --shards 3 \
            --shard "${{ matrix.shard }}" \
            tests/api tests/contract tests/domain \
            > "artifacts/pytest-files-shard-${{ matrix.shard }}.txt"
          echo "## Pytest Shard ${{ matrix.shard }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Selected files:" >> "${GITHUB_STEP_SUMMARY}"
          sed 's/^/- `/' "artifacts/pytest-files-shard-${{ matrix.shard }}.txt" \
            | sed 's/$/`/' >> "${GITHUB_STEP_SUMMARY}"

      - name: Pytest
        run: |
          set -euo pipefail
          mkdir -p artifacts
          mapfile -t pytest_files < "artifacts/pytest-files-shard-${{ matrix.shard }}.txt"
          if [ "${#pytest_files[@]}" -eq 0 ]; then
            echo "No pytest files selected for shard ${{ matrix.shard }}." >&2
            exit 1
          fi
          .venv/bin/python -m pytest "${pytest_files[@]}" -q \
            --junitxml="artifacts/pytest-backend-shard-${{ matrix.shard }}.xml" \
            --durations=25

      - name: Summarize pytest timing
        if: always()
        run: |
          if [ -f "artifacts/pytest-backend-shard-${{ matrix.shard }}.xml" ]; then
            python3 scripts/report-junit-timing.py "artifacts/pytest-backend-shard-${{ matrix.shard }}.xml" --top 25 \
              >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## Pytest Timing Report" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "Pytest timing artifact was not produced." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload pytest timing artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-backend-timing-shard-${{ matrix.shard }}
          path: |
            artifacts/pytest-backend-shard-${{ matrix.shard }}.xml
            artifacts/pytest-files-shard-${{ matrix.shard }}.txt
          if-no-files-found: ignore

  backend-postgres-cutover:
    name: PostgreSQL 16 encryption cutover regression
    needs: [classify, backend-scope]
    if: needs.classify.outputs.static_terms_only != 'true' && needs['backend-scope'].outputs.requires_full_backend == '1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned uv
        run: python -m pip install uv==0.11.29

      - name: Bootstrap backend test environment
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e '.[dev]'

      - name: Verify 0058-to-0068 cutover on PostgreSQL 16
        env:
          NPCINK_CLOUD_P1_E06_POSTGRES_ADMIN_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/postgres
        run: >-
          .venv/bin/python -m pytest -q
          tests/integration/test_runtime_data_encryption_0058_to_0068.py

  backend:
    name: backend
    needs: [classify, backend-scope, python-dependency-audit, production-python-image-smoke, backend-targeted, backend-static, backend-pytest, backend-postgres-cutover]
    if: always() && needs.classify.outputs.static_terms_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Verify backend gate result
        env:
          BACKEND_SCOPE_RESULT: ${{ needs['backend-scope'].result }}
          PYTHON_DEPENDENCY_AUDIT_RESULT: ${{ needs['python-dependency-audit'].result }}
          PRODUCTION_PYTHON_IMAGE_SMOKE_RESULT: ${{ needs['production-python-image-smoke'].result }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BACKEND_TARGETED_RESULT: ${{ needs['backend-targeted'].result }}
          BACKEND_STATIC_RESULT: ${{ needs['backend-static'].result }}
          BACKEND_PYTEST_RESULT: ${{ needs['backend-pytest'].result }}
          BACKEND_POSTGRES_CUTOVER_RESULT: ${{ needs['backend-postgres-cutover'].result }}
          REQUIRES_FULL_BACKEND: ${{ needs['backend-scope'].outputs.requires_full_backend }}
          DOCS_ONLY: ${{ needs.classify.outputs.docs_only }}
        run: |
          set -euo pipefail
          echo "scope=${BACKEND_SCOPE_RESULT}"
          echo "python_dependency_audit=${PYTHON_DEPENDENCY_AUDIT_RESULT}"
          echo "production_python_image_smoke=${PRODUCTION_PYTHON_IMAGE_SMOKE_RESULT}"
          echo "targeted=${BACKEND_TARGETED_RESULT}"
          echo "static=${BACKEND_STATIC_RESULT}"
          echo "pytest=${BACKEND_PYTEST_RESULT}"
          echo "postgres_cutover=${BACKEND_POSTGRES_CUTOVER_RESULT}"
          echo "requires_full_backend=${REQUIRES_FULL_BACKEND}"

          if [ "${BACKEND_SCOPE_RESULT}" != "success" ]; then
            echo "backend scope classification did not pass" >&2
            exit 1
          fi

          if [ "${DOCS_ONLY}" = "true" ]; then
            if [ "${PYTHON_DEPENDENCY_AUDIT_RESULT}" != "skipped" ]; then
              echo "python dependency audit should be skipped for docs-only changes" >&2
              exit 1
            fi
          elif [ "${PYTHON_DEPENDENCY_AUDIT_RESULT}" != "success" ]; then
              echo "python dependency audit did not pass" >&2
              exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ "${REQUIRES_FULL_BACKEND}" = "1" ]; then
            if [ "${PRODUCTION_PYTHON_IMAGE_SMOKE_RESULT}" != "success" ]; then
              echo "Python 3.14 Alpine production image smoke did not pass" >&2
              exit 1
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if [ "${PRODUCTION_PYTHON_IMAGE_SMOKE_RESULT}" != "skipped" ]; then
              echo "Python 3.14 Alpine production image smoke should be skipped for a targeted PR" >&2
              exit 1
            fi
          elif [ "${PRODUCTION_PYTHON_IMAGE_SMOKE_RESULT}" != "skipped" ] && [ "${PRODUCTION_PYTHON_IMAGE_SMOKE_RESULT}" != "success" ]; then
            echo "Python 3.14 Alpine production image smoke ended unexpectedly" >&2
            exit 1
          fi

          if [ "${REQUIRES_FULL_BACKEND}" = "1" ]; then
            if [ "${BACKEND_STATIC_RESULT}" != "success" ]; then
              echo "backend static gate did not pass" >&2
              exit 1
            fi
            if [ "${BACKEND_PYTEST_RESULT}" != "success" ]; then
              echo "backend pytest shards did not pass" >&2
              exit 1
            fi
            if [ "${BACKEND_POSTGRES_CUTOVER_RESULT}" != "success" ]; then
              echo "PostgreSQL 16 encryption cutover regression did not pass" >&2
              exit 1
            fi
          else
            if [ "${BACKEND_POSTGRES_CUTOVER_RESULT}" != "skipped" ]; then
              echo "PostgreSQL 16 encryption cutover regression should be skipped for a targeted gate" >&2
              exit 1
            fi
            if [ "${BACKEND_TARGETED_RESULT}" != "success" ]; then
              echo "targeted backend gate did not pass" >&2
              exit 1
            fi
          fi

  frontend:
    needs: [classify]
    if: needs.classify.outputs.static_terms_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: needs.classify.outputs.docs_only != 'true'
        uses: actions/checkout@v6

      - name: Setup pnpm
        if: needs.classify.outputs.docs_only != 'true'
        uses: pnpm/action-setup@v6

      - name: Setup Node
        if: needs.classify.outputs.docs_only != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: needs.classify.outputs.docs_only != 'true'
        run: pnpm install --frozen-lockfile --filter frontend...

      - name: Lint
        if: needs.classify.outputs.docs_only != 'true'
        run: pnpm --dir frontend run lint

      - name: Type Check
        if: needs.classify.outputs.docs_only != 'true'
        run: pnpm --dir frontend run type-check

      - name: Frontend Contracts
        if: needs.classify.outputs.docs_only != 'true'
        run: pnpm --dir frontend run test:contracts

      - name: Docs-only frontend acknowledgement
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "Frontend gate is not required for documentation-only changes."

  static-terms:
    needs: [classify]
    if: needs.classify.outputs.static_terms_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate static terms tree
        run: |
          set -euo pipefail
          bash scripts/check-release-policy.sh
          test -f site/terms/index.html
          test -f site/terms/en/terms.html
          test -f site/terms/zh/terms.html
          test -f site/terms/styles.css
          ! find site/terms -name '.DS_Store' -print -quit | grep -q .

  ci-observability:
    name: CI observability
    needs:
      - secret-scan
      - classify
      - backend
      - frontend
      - static-terms
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Summarize CI timing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! python3 scripts/report-release-timing.py "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" >> "${GITHUB_STEP_SUMMARY}"; then
            echo "## Release Timing Report" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "Timing summary was unavailable for this run." >> "${GITHUB_STEP_SUMMARY}"
          fi
