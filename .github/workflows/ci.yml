name: Cloud CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Anti Drift Unit
        run: pnpm run test:anti-drift

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Bootstrap Cloud Dev Environment
        run: make bootstrap-dev

      - name: Ruff
        run: .venv/bin/ruff check .

      - name: Mypy
        run: .venv/bin/mypy app

      - name: Pytest
        run: .venv/bin/python -m pytest tests/api tests/contract tests/domain -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run type-check

      - name: i18n Contract
        run: pnpm run test:i18n-contract

      - name: Portal Proxy Contract
        run: pnpm run test:portal-proxy-contract

      - name: Admin Dev Autologin Contract
        run: pnpm run test:admin-dev-autologin-contract
