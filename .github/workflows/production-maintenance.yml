name: Production Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Maintenance action to run."
        required: true
        default: "disk-report"
        type: choice
        options:
          - "disk-report"
          - "safe-prune"
      release_retention_count:
        description: "Number of release-* directories to keep when pruning old releases."
        required: false
        default: "4"
      safe_prune_confirmation:
        description: "For safe-prune only, type: Prune production images and old releases."
        required: false
        default: ""
        type: string

concurrency:
  group: production-host-mutation
  cancel-in-progress: false

jobs:
  maintenance:
    name: Production SSH maintenance
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    environment: production
    permissions: {}
    steps:
      - name: Install SSH key
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "${PROD_SSH_KEY}"
          test -n "${PROD_SSH_HOST}"
          test -n "${PROD_SSH_KNOWN_HOSTS}"
          mkdir -p ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/npcink_prod_maintenance_key
          chmod 600 ~/.ssh/npcink_prod_maintenance_key
          printf '%s\n' "${PROD_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          known_host_lookup="${PROD_SSH_HOST}"
          if [ "${PROD_SSH_PORT}" != "22" ]; then
            known_host_lookup="[${PROD_SSH_HOST}]:${PROD_SSH_PORT}"
          fi
          ssh-keygen -F "${known_host_lookup}" -f ~/.ssh/known_hosts >/dev/null

      - name: Run maintenance
        env:
          MAINTENANCE_ACTION: ${{ inputs.action }}
          RELEASE_RETENTION_COUNT: ${{ inputs.release_retention_count }}
          SAFE_PRUNE_CONFIRMATION: ${{ inputs.safe_prune_confirmation }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
          PROD_REMOTE_DIR: ${{ secrets.PROD_REMOTE_DIR || '/opt/npcink-ai-cloud' }}
        run: |
          set -euo pipefail
          test "${PROD_SSH_USER}" = "root"
          case "${MAINTENANCE_ACTION}" in
            disk-report|safe-prune) ;;
            *)
              echo "[fail] Unknown maintenance action: ${MAINTENANCE_ACTION}" >&2
              exit 1
              ;;
          esac
          if [ "${MAINTENANCE_ACTION}" = "safe-prune" ] && \
            [ "${SAFE_PRUNE_CONFIRMATION}" != "Prune production images and old releases." ]; then
            echo "[fail] safe-prune requires the exact human confirmation phrase." >&2
            exit 1
          fi
          case "${RELEASE_RETENTION_COUNT}" in
            ''|*[!0-9]*)
              echo "[fail] release_retention_count must be a positive integer" >&2
              exit 1
              ;;
          esac
          if [ "${RELEASE_RETENTION_COUNT}" -lt 1 ]; then
            echo "[fail] release_retention_count must be at least 1" >&2
            exit 1
          fi

          if [[ ! "${PROD_REMOTE_DIR}" =~ ^/[A-Za-z0-9._/-]+$ ]] || \
            [[ "/${PROD_REMOTE_DIR#/}/" = */../* ]] || \
            [[ "/${PROD_REMOTE_DIR#/}/" = */./* ]]; then
            echo "[fail] PROD_REMOTE_DIR must be a safe absolute path without dot traversal." >&2
            exit 1
          fi

          remote_shell_arg() {
            printf '%q' "$1"
          }

          ssh_args=(
            -p "${PROD_SSH_PORT}"
            -i /home/runner/.ssh/npcink_prod_maintenance_key
            -o StrictHostKeyChecking=yes
            -o BatchMode=yes
            -o ConnectTimeout=10
          )
          ssh_target="${PROD_SSH_USER}@${PROD_SSH_HOST}"
          remote_command="bash -s -- $(remote_shell_arg "${MAINTENANCE_ACTION}") $(remote_shell_arg "${PROD_REMOTE_DIR}") $(remote_shell_arg "${RELEASE_RETENTION_COUNT}")"

          ssh "${ssh_args[@]}" "${ssh_target}" "${remote_command}" <<'REMOTE'
          set -euo pipefail

          action="$1"
          remote_dir="$2"
          keep_count="$3"
          maintenance_lock_held=0
          install_lock_held=0
          release_tool_python="/usr/bin/python3.11"
          current_release=""

          cleanup_maintenance_lock() {
            exit_status="$?"
            trap - EXIT
            if [ "${install_lock_held}" = "1" ]; then
              npcink_ai_cloud_stop_install_lock_broker || exit_status=1
              install_lock_held=0
            fi
            if [ "${maintenance_lock_held}" = "1" ]; then
              if [ -L "${remote_dir}/.deploy-lock" ] || \
                [ ! -d "${remote_dir}/.deploy-lock" ] || \
                [ "$(stat -c '%u:%g:%a' -- "${remote_dir}/.deploy-lock" 2>/dev/null || true)" != "0:0:700" ] || \
                ! rmdir -- "${remote_dir}/.deploy-lock" || \
                [ -e "${remote_dir}/.deploy-lock" ] || [ -L "${remote_dir}/.deploy-lock" ]; then
                echo "[fail] Production maintenance lock cleanup failed." >&2
                exit_status=1
              fi
            fi
            exit "${exit_status}"
          }
          trap cleanup_maintenance_lock EXIT

          disk_report() {
            echo "[info] Disk usage"
            df -h
            echo "[info] Docker disk usage"
            docker system df || true
            echo "[info] Remote directory usage"
            if [ -d "${remote_dir}" ]; then
              du -sh "${remote_dir}" || true
              find "${remote_dir}" -maxdepth 1 -type d -name 'release-*' -printf '%T@ %p\n' \
                | sort -rn \
                | awk '{printf "%s\n", $2}' \
                | head -20 \
                | xargs -r du -sh || true
            fi
          }

          prune_old_releases() {
            if [ ! -d "${remote_dir}" ]; then
              echo "[warn] Remote directory missing: ${remote_dir}" >&2
              return
            fi
            current_target=""
            if [ -L "${remote_dir}/current" ]; then
              current_target="$(readlink -f "${remote_dir}/current" || true)"
            fi
            find "${remote_dir}" -maxdepth 1 -type d -name 'release-*' -printf '%T@ %p\n' \
              | sort -rn \
              | awk -v keep="${keep_count}" -v current="${current_target}" '
                NR <= keep { next }
                $2 == current { next }
                { print $2 }
              ' \
              | while IFS= read -r release_dir; do
                  if [ -n "${release_dir}" ] && [ -d "${release_dir}" ]; then
                    echo "[info] Removing old release ${release_dir}"
                    rm -rf -- "${release_dir}"
                  fi
                done
            rm -f -- "${remote_dir}/deploy-bundle.tgz"
          }

          disk_report
          if [ "${action}" = "safe-prune" ]; then
            [ -d "${remote_dir}" ] || {
              echo "[fail] Remote directory missing: ${remote_dir}" >&2
              exit 1
            }
            if [ "$(id -u)" != "0" ] || [ ! -x "${release_tool_python}" ] || \
              ! "${release_tool_python}" -c \
                'import sys; raise SystemExit(0 if sys.version_info >= (3, 11) else 1)'; then
              echo "[fail] safe-prune requires root and /usr/bin/python3.11 or newer before host mutation." >&2
              exit 1
            fi
            current_release="$(readlink -f "${remote_dir}/current" 2>/dev/null || true)"
            if [[ "${current_release}" != "${remote_dir}"/release-* ]] || \
              [ "$(dirname "${current_release}")" != "${remote_dir}" ] || \
              [ ! -f "${current_release}/deploy/common.sh" ] || \
              [ -L "${current_release}/deploy/common.sh" ] || \
              [ ! -f "${current_release}/deploy/install-lock.py" ] || \
              [ -L "${current_release}/deploy/install-lock.py" ] || \
              [ ! -f "${current_release}/deploy/validate-installation-complete.py" ] || \
              [ -L "${current_release}/deploy/validate-installation-complete.py" ]; then
              echo "[fail] safe-prune requires an exact direct managed current release." >&2
              exit 1
            fi
            export NPCINK_CLOUD_RELEASE_TOOL_PYTHON="${release_tool_python}"
            # shellcheck source=/dev/null
            . "${current_release}/deploy/common.sh"
            validate_completed_installation() {
              "${release_tool_python}" \
                "${current_release}/deploy/validate-installation-complete.py" \
                --managed-root "${remote_dir}" \
                --sentinel "${remote_dir}/.installation-complete" \
                --state "${remote_dir}/shared/config/install-state.json" \
                --runtime "${remote_dir}/shared/config/runtime-config.json" >/dev/null
              if [ -e "${remote_dir}/.first-install-pending.json" ] || \
                [ -L "${remote_dir}/.first-install-pending.json" ]; then
                echo "[fail] safe-prune is forbidden until explicit first-install finalize acceptance." >&2
                return 1
              fi
            }
            # A missing permanent sentinel never becomes permission to mutate,
            # even when install-state.json says complete.
            validate_completed_installation || {
              echo "[fail] safe-prune requires durable installation-complete acceptance and matching current PostgreSQL 18 runtime state." >&2
              exit 1
            }
            if ! mkdir -m 0700 -- "${remote_dir}/.deploy-lock"; then
              echo "[fail] Production deploy or another mutating operation holds the lock." >&2
              exit 1
            fi
            maintenance_lock_held=1
            if [ -L "${remote_dir}/.deploy-lock" ] || \
              [ "$(stat -c '%u:%g:%a' -- "${remote_dir}/.deploy-lock")" != "0:0:700" ]; then
              echo "[fail] safe-prune mutation lock must be a root-owned mode-0700 directory." >&2
              exit 1
            fi
            install_lock_file="${remote_dir}/shared/config/.install.lock"
            if ! npcink_ai_cloud_start_install_lock_broker \
              "${current_release}" "${install_lock_file}" 0; then
              echo "[fail] Setup installation is active; safe-prune is forbidden." >&2
              exit 1
            fi
            install_lock_held=1
            # Re-read all positive evidence after both mutation locks so no
            # state/marker replacement can race the destructive operation.
            validate_completed_installation || {
              echo "[fail] safe-prune installation evidence changed while locks were acquired." >&2
              exit 1
            }
            echo "[info] Pruning stopped containers, unused images, and build cache"
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            prune_old_releases
            echo "[info] Disk usage after safe prune"
            disk_report
          fi
          cleanup_maintenance_lock
          REMOTE
