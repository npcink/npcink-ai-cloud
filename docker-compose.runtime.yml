services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-npcink_ai_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-npcink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npcink} -d ${POSTGRES_DB:-npcink_ai_cloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cloud-postgres-prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - cloud-redis-prod:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
    volumes:
      - ./deploy/otel-collector.config.yml:/etc/otelcol-contrib/config.yaml:ro

  jaeger:
    image: jaegertracing/all-in-one:1.59
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${NPCINK_CLOUD_JAEGER_BIND_HOST:-127.0.0.1}:${NPCINK_CLOUD_JAEGER_UI_PORT:-16686}:16686"

  api:
    image: npcink-ai-cloud-api:prod
    restart: unless-stopped
    command: >-
      gunicorn -k uvicorn.workers.UvicornWorker
      --forwarded-allow-ips 172.28.0.10
      -w ${NPCINK_CLOUD_API_WORKERS:-1}
      -b 0.0.0.0:8000
      app.api.main:app
    env_file:
      - .env.deploy
    environment:
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
      NPCINK_CLOUD_OTEL_TRACE_QUERY_URL: ${NPCINK_CLOUD_OTEL_TRACE_QUERY_URL:-http://127.0.0.1:${NPCINK_CLOUD_JAEGER_UI_PORT:-16686}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    expose:
      - "8000"
    volumes:
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  frontend:
    image: npcink-ai-cloud-frontend:prod
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      CLOUD_API_BASE_URL: http://api:8000
      CLOUD_PUBLIC_BASE_URL: ${NPCINK_CLOUD_BASE_URL:-http://127.0.0.1:${NPCINK_CLOUD_PORT:-8010}}
      NODE_ENV: production
    expose:
      - "3000"

  worker:
    image: npcink-ai-cloud-worker:prod
    restart: unless-stopped
    command: python -m app.workers.runtime_queue
    env_file:
      - .env.deploy
    environment:
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
      NPCINK_CLOUD_OTEL_TRACE_QUERY_URL: ${NPCINK_CLOUD_OTEL_TRACE_QUERY_URL:-http://127.0.0.1:${NPCINK_CLOUD_JAEGER_UI_PORT:-16686}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    volumes:
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  callback-worker:
    image: npcink-ai-cloud-worker:prod
    restart: unless-stopped
    command: python -m app.workers.callback_dispatch
    env_file:
      - .env.deploy
    environment:
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
      NPCINK_CLOUD_OTEL_TRACE_QUERY_URL: ${NPCINK_CLOUD_OTEL_TRACE_QUERY_URL:-http://127.0.0.1:${NPCINK_CLOUD_JAEGER_UI_PORT:-16686}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started

  ops-worker:
    image: npcink-ai-cloud-worker:prod
    restart: unless-stopped
    command: python -m app.workers.ops_cadence
    env_file:
      - .env.deploy
    environment:
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_TRACE_SINK_OTLP_ENDPOINT:-jaeger:4317}
      NPCINK_CLOUD_OTEL_TRACE_QUERY_URL: ${NPCINK_CLOUD_OTEL_TRACE_QUERY_URL:-http://127.0.0.1:${NPCINK_CLOUD_JAEGER_UI_PORT:-16686}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    volumes:
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "127.0.0.1:${NPCINK_CLOUD_PORT:-8010}:8080"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./site:/usr/share/nginx/html/npcink-site:ro
    networks:
      default:
        ipv4_address: 172.28.0.10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      default:
        ipv4_address: 172.28.0.11

volumes:
  cloud-artifacts-prod:
  cloud-postgres-prod:
  cloud-redis-prod:
  caddy-data:
  caddy-config:

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
