services:
  redis:
    image: ${NPCINK_CLOUD_REDIS_RELEASE_IMAGE:-npcink-ai-cloud-external-redis:prod}
    pull_policy: never
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - cloud-redis-prod:/data

  api:
    image: ${NPCINK_CLOUD_API_RELEASE_IMAGE:-npcink-ai-cloud-api:prod}
    pull_policy: never
    restart: unless-stopped
    command: >-
      gunicorn -k uvicorn.workers.UvicornWorker
      --forwarded-allow-ips ${NPCINK_CLOUD_RUNTIME_PROXY_IPV4:-172.28.0.10}
      -w 1
      -b 0.0.0.0:8000
      app.api.main:app
    env_file:
      - ${NPCINK_CLOUD_BACKEND_ENV_FILE:-.env.deploy}
    environment:
      NPCINK_CLOUD_ENVIRONMENT: production
      NPCINK_CLOUD_CONFIG_DIR: /run/npcink-config
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
      NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT: ${NPCINK_CLOUD_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      NPCINK_CLOUD_OTEL_TRACE_QUERY_URL: ${NPCINK_CLOUD_OTEL_TRACE_QUERY_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ${NPCINK_CLOUD_CONFIG_DIR_HOST:-./shared/config}:/run/npcink-config
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  frontend:
    image: ${NPCINK_CLOUD_FRONTEND_RELEASE_IMAGE:-npcink-ai-cloud-frontend:prod}
    pull_policy: never
    restart: unless-stopped
    environment:
      CLOUD_API_BASE_URL: http://api:8000
      CLOUD_PUBLIC_BASE_URL: ${NPCINK_CLOUD_BASE_URL:-http://127.0.0.1:${NPCINK_CLOUD_PORT:-8010}}
      NPCINK_CLOUD_INTERNAL_AUTH_TOKEN_FILE: /run/npcink-frontend-config/internal-auth-token
      NODE_ENV: production
    group_add:
      - "999"
    expose:
      - "3000"
    volumes:
      - ${NPCINK_CLOUD_CONFIG_DIR_HOST:-./shared/config}/frontend:/run/npcink-frontend-config:ro

  worker:
    image: ${NPCINK_CLOUD_WORKER_RELEASE_IMAGE:-npcink-ai-cloud-worker:prod}
    pull_policy: never
    restart: unless-stopped
    entrypoint: ["/app/deploy/wait-for-install.sh"]
    command: ["python", "-m", "app.workers.runtime_queue"]
    env_file:
      - ${NPCINK_CLOUD_BACKEND_ENV_FILE:-.env.deploy}
    environment:
      NPCINK_CLOUD_ENVIRONMENT: production
      NPCINK_CLOUD_CONFIG_DIR: /run/npcink-config
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${NPCINK_CLOUD_CONFIG_DIR_HOST:-./shared/config}:/run/npcink-config:ro
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  callback-worker:
    image: ${NPCINK_CLOUD_CALLBACK_WORKER_RELEASE_IMAGE:-npcink-ai-cloud-worker:prod}
    pull_policy: never
    restart: unless-stopped
    entrypoint: ["/app/deploy/wait-for-install.sh"]
    command: ["python", "-m", "app.workers.callback_dispatch"]
    env_file:
      - ${NPCINK_CLOUD_BACKEND_ENV_FILE:-.env.deploy}
    environment:
      NPCINK_CLOUD_ENVIRONMENT: production
      NPCINK_CLOUD_CONFIG_DIR: /run/npcink-config
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${NPCINK_CLOUD_CONFIG_DIR_HOST:-./shared/config}:/run/npcink-config:ro

  ops-worker:
    image: ${NPCINK_CLOUD_OPS_WORKER_RELEASE_IMAGE:-npcink-ai-cloud-worker:prod}
    pull_policy: never
    restart: unless-stopped
    entrypoint: ["/app/deploy/wait-for-install.sh"]
    command: ["python", "-m", "app.workers.ops_cadence"]
    env_file:
      - ${NPCINK_CLOUD_BACKEND_ENV_FILE:-.env.deploy}
    environment:
      NPCINK_CLOUD_ENVIRONMENT: production
      NPCINK_CLOUD_CONFIG_DIR: /run/npcink-config
      NPCINK_CLOUD_ARTIFACT_STORE_ROOT: /var/lib/npcink-ai-cloud/artifacts
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${NPCINK_CLOUD_CONFIG_DIR_HOST:-./shared/config}:/run/npcink-config:ro
      - cloud-artifacts-prod:/var/lib/npcink-ai-cloud/artifacts

  proxy:
    image: ${NPCINK_CLOUD_PROXY_RELEASE_IMAGE:-npcink-ai-cloud-external-nginx:prod}
    pull_policy: never
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "127.0.0.1:${NPCINK_CLOUD_PORT:-8010}:8080"
    volumes:
      - ${NPCINK_CLOUD_RUNTIME_NGINX_CONFIG_PATH:-./deploy/nginx.prod.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./site:/usr/share/nginx/html/npcink-site:ro
    networks:
      default:
        ipv4_address: ${NPCINK_CLOUD_RUNTIME_PROXY_IPV4:-172.28.0.10}

  release-one-off:
    extends:
      service: api
    profiles: ["release-one-off"]
    image: ${NPCINK_CLOUD_API_RELEASE_IMAGE:-npcink-ai-cloud-api:prod}
    pull_policy: never
    restart: "no"
    entrypoint: ["python"]
    command: ["-c", "import signal; signal.pause()"]

volumes:
  cloud-artifacts-prod:
  cloud-redis-prod:

networks:
  default:
    ipam:
      config:
        - subnet: ${NPCINK_CLOUD_RUNTIME_NETWORK_SUBNET:-172.28.0.0/24}
          gateway: ${NPCINK_CLOUD_RUNTIME_NETWORK_GATEWAY:-172.28.0.1}
